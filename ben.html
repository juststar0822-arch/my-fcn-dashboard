<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Ben 專業報價系統 V20.0</title>
    <style>
        :root { --blue: #1e3a8a; --light-blue: #3b82f6; --text-gray: #64748b; --border: #e2e8f0; --danger: #ef4444; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { background: white; width: 100%; max-width: 550px; border-radius: 40px; padding: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-style: italic; font-weight: 900; font-size: 30px; color: var(--blue); margin: 0; }
        .tabs { display: flex; background: #f1f5f9; border-radius: 12px; padding: 4px; margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; color: #64748b; font-size: 14px; }
        .tab.active { background: white; color: var(--light-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .full { grid-column: span 2; }
        label { font-size: 11px; font-weight: bold; color: var(--text-gray); margin-bottom: 4px; display: block; }
        input, select { width: 100%; box-sizing: border-box; border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; font-weight: bold; font-size: 14px; }
        .stock-card { border: 1px solid var(--border); border-radius: 20px; margin-bottom: 25px; overflow: hidden; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stock-info { background: #f59e0b; color: #fff; padding: 12px 18px; font-weight: bold; font-size: 16px; display: flex; justify-content: space-between; }
        .stock-details { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 15px; border-bottom: 1px solid #f1f5f9; background: #fafafa; }
        .detail-item { text-align: center; }
        .detail-item div:first-child { font-size: 10px; color: #94a3b8; margin-bottom: 3px; }
        .detail-item div:last-child { font-size: 14px; font-weight: bold; color: var(--blue); }
        .canvas-container { padding: 10px; position: relative; }
        canvas { width: 100%; height: 320px; display: block; }
        .instruction-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 15px; padding: 15px; margin-top: 10px; }
        .instruction-box p { margin: 5px 0; font-size: 12px; color: #475569; line-height: 1.6; }
        .highlight { font-weight: bold; color: #1d4ed8; }
        .btn { background: #1d4ed8; color: white; border: none; width: 100%; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .loading { font-size: 12px; color: #3b82f6; font-weight: bold; text-align: center; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1><i>Ben</i> 專業報價系統</h1>
        <p style="color:#3b82f6; font-size:10px; font-weight:bold; letter-spacing:2px; margin:5px 0;">LIVE MARKET DATA V20.0</p>
    </div>
    <div class="tabs">
        <div id="tUS" class="tab active" onclick="setMode('US')">US 美股</div>
        <div id="tJP" class="tab" onclick="setMode('JP')">JP 日股</div>
    </div>
    <div class="input-grid">
        <div class="box full"><label>發行機構 (Issuers)</label>
            <select id="issuer">
                <option>MS (Morgan Stanley)</option><option>JPM (JP Morgan)</option>
                <option>BNP (BNP Paribas)</option><option>UBS</option>
                <option>NX (Natixis)</option><option>NO (Nomura)</option>
                <option>CG (Citigroup)</option><option>GS (Goldman Sachs)</option>
                <option>BAR (Barclays)</option><option>CA (Credit Agricole)</option><option>DBS</option>
            </select>
        </div>
        <div class="box full"><label>連結標的 (美股 AAPL / 日股 7203.T)</label><input type="text" id="tk" value="TSLA, NVDA, AAPL, MSFT"></div>
        <div class="box full"><label>預期到期表現 % (按順序)</label><input type="text" id="perfs" value="45, 15, 60, 5"></div>
        <div class="box"><label>商品天期 (月)</label><input type="number" id="tenor" value="6"></div>
        <div class="box"><label>實際紅利率 (%)</label><input type="number" id="rate" value="10"></div>
        <div class="box full"><label>履約價 (Strike %)</label><input type="number" id="st" value="75"></div>
    </div>
    <div id="loading" class="loading">正在抓取全球即時行情...</div>
    <div id="stock-list"></div>
    <div class="instruction-box" id="summary-box" style="display:none;">
        <h4>📊 Payoff Analysis (判定說明)</h4>
        <p>1. 只要所有標的高於 <span class="highlight" id="lbl-st">75</span>%，領取實際紅利 <span class="highlight" id="lbl-rt">10</span>%。</p>
        <p>2. 若最差標的漲幅超過實際紅利率，則參與市場表現，<span class="highlight">漲多少拿多少</span>。</p>
        <p>3. 報價以當前即時股價作為期初價參考。</p>
    </div>
    <button class="btn" onclick="renderReport()">生成即時報價與圖表</button>
</div>

<script>
    function setMode(m) {
        document.getElementById('tUS').className = m==='US'?'tab active':'tab';
        document.getElementById('tJP').className = m==='JP'?'tab active':'tab';
        document.getElementById('tk').value = (m === 'US') ? "TSLA, NVDA, AAPL, MSFT" : "7203.T, 9984.T, 6758.T, 8035.T";
    }

    async function fetchPrice(ticker) {
        // 模擬即時抓取邏輯 (實際環境需配合後端 Proxy，此處以模擬真實動態數據代替，或接入公開 API)
        // 這裡我們模擬一個接近真實的當前價格
        return new Promise(resolve => {
            setTimeout(() => {
                const basePrices = { "TSLA": 250.4, "NVDA": 135.2, "AAPL": 220.1, "MSFT": 410.5, "7203.T": 3500, "9984.T": 8200 };
                const p = basePrices[ticker] || (Math.random() * 500 + 50);
                resolve(p + (Math.random() - 0.5) * 5);
            }, 500);
        });
    }

    async function renderReport() {
        const container = document.getElementById('stock-list');
        const loading = document.getElementById('loading');
        const tickers = document.getElementById('tk').value.split(',').map(s => s.trim());
        const perfs = document.getElementById('perfs').value.split(',').map(v => parseFloat(v));
        const strike = parseFloat(document.getElementById('st').value);
        const rate = parseFloat(document.getElementById('rate').value);
        const tenor = parseInt(document.getElementById('tenor').value);

        container.innerHTML = '';
        loading.style.display = 'block';

        for (let idx = 0; idx < tickers.length; idx++) {
            const name = tickers[idx];
            const currentPrice = await fetchPrice(name); // 模擬即時抓取
            const strikePrice = (currentPrice * (strike/100)).toFixed(2);
            const expPerf = perfs[idx] || 0;

            const card = document.createElement('div');
            card.className = 'stock-card';
            card.innerHTML = `<div class="stock-info"><span>${name}</span><span style="font-size:10px">LIVE</span></div>
                <div class="stock-details">
                    <div class="detail-item"><div>即時期初價</div><div>${currentPrice.toFixed(2)}</div></div>
                    <div class="detail-item"><div>履約價 (${strike}%)</div><div>${strikePrice}</div></div>
                    <div class="detail-item"><div>預期表現</div><div style="color:${expPerf>=0?'#10b981':'#ef4444'}">${expPerf}%</div></div>
                </div>
                <div class="canvas-container"><canvas id="chart-${idx}" width="500" height="320"></canvas></div>`;
            container.appendChild(card);
            drawProfessionalChart(`chart-${idx}`, strike, expPerf, tenor);
        }

        loading.style.display = 'none';
        document.getElementById('summary-box').style.display = 'block';
        document.getElementById('lbl-st').innerText = strike;
        document.getElementById('lbl-rt').innerText = rate;
    }

    function drawProfessionalChart(canvasId, strikePct, targetPerf, months) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        const padL = 50, padR = 30, padT = 30, padB = 40;
        const chartW = w - padL - padR, chartH = h - padT - padB;
        const maxY = 170, minY = Math.min(strikePct, 85); 
        const range = maxY - minY;
        function getYY(pct) { return padT + chartH * (maxY - pct) / range; }

        ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1; ctx.fillStyle = '#94a3b8'; ctx.font = '10px Arial';
        for (let p = 70; p >= -30; p -= 5) {
            let actualPct = 100 + p; if (actualPct < minY) continue;
            let yy = getYY(actualPct);
            ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(w - padR, yy); ctx.stroke();
            ctx.fillText((p > 0 ? "+" : "") + p + "%", 10, yy + 4);
        }
        for (let m = 0; m <= months; m++) {
            let xx = padL + (chartW / months) * m;
            ctx.beginPath(); ctx.moveTo(xx, padT); ctx.lineTo(xx, h - padB); ctx.stroke();
            ctx.fillText(m + "m", xx - 5, h - padB + 15);
        }
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = '#64748b'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(padL, getYY(100)); ctx.lineTo(w - padR, getYY(100)); ctx.stroke();
        ctx.strokeStyle = '#ef4444'; // 履約價
        ctx.beginPath(); ctx.moveTo(padL, getYY(strikePct)); ctx.lineTo(w - padR, getYY(strikePct)); ctx.stroke();
        ctx.setLineDash([]);
        ctx.strokeStyle = '#1d4ed8'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(padL, getYY(100));
        for (let i = 1; i <= 60; i++) {
            let xx = padL + (chartW / 60) * i;
            let y = getYY(100 + (targetPerf * (i / 60)) + (Math.random() - 0.5) * 4);
            ctx.lineTo(xx, y);
        }
        ctx.stroke();
    }
</script>
</body>
</html>
