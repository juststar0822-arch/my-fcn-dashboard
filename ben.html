<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben - 真實數據專業版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { background: #cbd5e1; font-family: 'Noto Sans TC', sans-serif; }
        [v-cloak] { display: none; }
        .ben-card { background: white; border-radius: 40px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .ben-title { color: #1e3a8a; font-size: 32px; font-weight: 900; font-style: italic; }
        .ben-subtitle { color: #3b82f6; font-size: 14px; letter-spacing: 2px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        .ben-input { background: #f1f5f9; border: none; border-radius: 20px; padding: 15px; text-align: center; font-weight: bold; width: 100%; font-size: 16px; appearance: none; }
        .ben-btn { background: #1e3a8a; color: white; border-radius: 25px; padding: 18px; width: 100%; font-size: 20px; font-weight: bold; transition: 0.3s; margin-top: 10px; cursor: pointer; }
        .ben-btn:hover { background: #172554; }
        .ben-label { color: #94a3b8; font-size: 14px; font-weight: bold; margin-bottom: 8px; display: block; }
        
        /* 報價單樣式 */
        .capture-box { width: 450px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; }
        .page-container { width: 410px; border: 2px solid #000; background: #fff; margin: 0 auto; overflow: hidden; }
        .summary-header { background: #fff; padding: 15px; text-align: center; border-bottom: 2px solid #000; font-size: 24px; font-weight: 900; }
        .summary-table { width: 100%; border-collapse: collapse; }
        .navy-cell { background: #1e3a8a; color: white; border: 1px solid #000; text-align: center; font-size: 12px; padding: 10px; font-weight: bold; }
        .white-cell { background: #fff; border: 1px solid #000; text-align: center; font-weight: 900; font-size: 18px; padding: 10px; }
        .chart-container { position: relative; width: 100%; height: 160px; margin-top: 10px; padding: 5px; }
    </style>
</head>
<body class="p-4">
    <div id="app" v-cloak class="max-w-md mx-auto">
        <div v-if="!isLocked" class="ben-card text-center mb-6 no-print">
            <h1 class="ben-title">Ben銀坑 V7.0</h1>
            <p class="ben-subtitle">NO KI STRUCTURE</p>

            <div class="flex gap-2 mb-6 bg-slate-100 p-1 rounded-2xl">
                <button @click="form.market = 'US'" :class="['flex-1 py-3 rounded-xl font-bold transition', form.market==='US'?'bg-white text-blue-700 shadow-sm':'text-slate-400']">US 美股</button>
                <button @click="form.market = 'JP'" :class="['flex-1 py-3 rounded-xl font-bold transition', form.market==='JP'?'bg-white text-blue-700 shadow-sm':'text-slate-400']">JP 日股</button>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="ben-label">發行機構</label>
                        <select v-model="form.issuer" class="ben-input">
                            <option v-for="opt in issuerOptions" :key="opt" :value="opt">{{ opt }}</option>
                        </select>
                    </div>
                    <div><label class="ben-label">履約價 %</label><input v-model="form.strikeP" type="number" class="ben-input"></div>
                </div>
                <div>
                    <label class="ben-label">連結標的 (代碼用逗號分隔)</label>
                    <input v-model="form.tickers" class="ben-input" placeholder="AAPL, NVDA, TSLA">
                </div>
                <div>
                    <label class="ben-label">預期到期表現 (%, 逗號分隔)</label>
                    <input v-model="form.expected" class="ben-input" placeholder="1.0, 50, 60">
                </div>
                <div><label class="ben-label">紅利率 (PA %)</label><input v-model="form.coupon" type="number" class="ben-input"></div>
                
                <button @click="generate" :disabled="isSyncing" class="ben-btn">
                    {{ isSyncing ? '數據抓取中...' : '生成報價單' }}
                </button>
                <p class="text-[11px] font-bold text-slate-500 mt-4 tracking-wider uppercase">Total Assets: USD / JPY Display</p>
            </div>
        </div>

        <div v-if="isGenerated">
            <div class="flex gap-3 mb-6 no-print">
                <button @click="capture" class="flex-1 bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg">📸 下載報價單圖片</button>
                <button @click="isLocked = !isLocked" class="bg-slate-800 text-white px-6 rounded-2xl font-bold">🔒</button>
            </div>

            <div id="capture-area" class="capture-box shadow-2xl">
                <div class="page-container">
                    <div class="summary-header">Ben銀坑 V7.0 報價單</div>
                    <table class="summary-table">
                        <tr>
                            <td class="navy-cell" width="25%">發行機構</td><td class="white-cell">{{ form.issuer }}</td>
                            <td class="navy-cell" width="25%">計價幣別</td><td class="white-cell">{{ form.market === 'JP' ? 'JPY' : 'USD' }}</td>
                        </tr>
                        <tr>
                            <td class="navy-cell">年化紅利</td><td class="white-cell text-blue-700">{{ form.coupon }}%</td>
                            <td class="navy-cell">履約價</td><td class="white-cell text-red-600">{{ form.strikeP }}%</td>
                        </tr>
                    </table>
                    
                    <div class="bg-slate-50 p-2 text-center text-[10px] font-black border-b border-black uppercase tracking-widest">Underlying Assets Status</div>
                    
                    <div v-for="(s, idx) in stockData" :key="s.symbol" class="p-4 border-b border-slate-100">
                        <div class="flex justify-between items-center mb-1">
                            <div>
                                <div class="font-black text-xl leading-none">{{ s.symbol }}</div>
                                <div class="text-[10px] text-slate-400 font-bold mt-1">Exp: {{ getExpValue(idx) }}%</div>
                            </div>
                            <div class="text-right">
                                <div class="text-xs font-bold text-slate-500">Price: {{ s.price }}</div>
                                <div v-if="s.hasTouchedStrike" class="text-[10px] bg-red-600 text-white px-2 py-0.5 rounded mt-1 font-black inline-block">STRIKE TOUCHED</div>
                            </div>
                        </div>
                        <div class="chart-container">
                            <canvas :id="'chart-v7-' + idx"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    isLocked: false, isGenerated: false, isSyncing: false,
                    issuerOptions: ['MS', 'JPM', 'BNP', 'UBS', 'NX', 'NO', 'CG', 'GS', 'BAR', 'CA', 'DBS'],
                    form: { market: 'US', issuer: 'MS', tickers: 'AAPL, NVDA, TSLA', expected: '1.0, 50, 60', coupon: 46.06, strikeP: 75 },
                    stockData: [],
                    strikeHistory: {}
                }
            },
            methods: {
                getExpValue(idx) {
                    const arr = this.form.expected.split(',');
                    return arr[idx] ? arr[idx].trim() : '-';
                },
                async fetchStock(ticker) {
                    const proxies = [
                        u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
                        u => `https://corsproxy.io/?${encodeURIComponent(u)}`
                    ];
                    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=1y&interval=1d`;
                    
                    for (let pFn of proxies) {
                        try {
                            const res = await fetch(pFn(url));
                            if (!res.ok) continue;
                            const json = await res.json();
                            const result = json.chart.result[0];
                            const prices = result.indicators.quote[0].close.filter(p => p != null);
                            const currentPrice = prices[prices.length - 1];
                            const strikeVal = currentPrice * (this.form.strikeP / 100);
                            
                            // 標記是否觸及履約價
                            if (prices.some(p => p <= strikeVal)) this.strikeHistory[ticker] = true;

                            return {
                                symbol: ticker,
                                price: currentPrice.toFixed(2),
                                history: prices,
                                strikeLevel: strikeVal,
                                hasTouchedStrike: this.strikeHistory[ticker] || false,
                                labels: prices.map((_, i) => i)
                            };
                        } catch (e) { continue; }
                    }
                    return null;
                },
                async generate() {
                    this.isSyncing = true; this.isGenerated = false; this.stockData = [];
                    let list = this.form.tickers.split(',').map(s => s.trim().toUpperCase()).filter(t => t);
                    if (this.form.market === 'JP') list = list.map(t => t.endsWith('.T') ? t : t + '.T');

                    for (let t of list) {
                        const data = await this.fetchStock(t);
                        if (data) this.stockData.push(data);
                        await new Promise(r => setTimeout(r, 400));
                    }

                    if (this.stockData.length > 0) {
                        this.isGenerated = true;
                        this.$nextTick(() => {
                            setTimeout(() => {
                                this.stockData.forEach((s, i) => this.drawChart(i, s));
                            }, 500);
                        });
                    } else { alert("數據抓取超時，請檢查網路或更換瀏覽器後再試一次。"); }
                    this.isSyncing = false;
                },
                drawChart(idx, stock) {
                    const ctx = document.getElementById('chart-v7-' + idx).getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: stock.labels,
                            datasets: [
                                { data: stock.history, borderColor: '#3b82f6', borderWidth: 2, pointRadius: 0, fill: false },
                                { data: Array(stock.history.length).fill(stock.strikeLevel), borderColor: '#ef4444', borderDash: [5, 5], borderWidth: 1, pointRadius: 0, fill: false }
                            ]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { 
                                x: { display: false }, 
                                y: { position: 'right', ticks: { font: { size: 9 } } } 
                            },
                            animation: false
                        }
                    });
                },
                async capture() {
                    window.scrollTo(0,0);
                    const el = document.getElementById('capture-area');
                    const canvas = await html2canvas(el, { scale: 3, useCORS: true });
                    const link = document.createElement('a');
                    link.download = `BenV7-Report.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
