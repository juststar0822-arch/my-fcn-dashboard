<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Ben 專業報價系統 V21.0</title>
    <style>
        :root { --blue: #1e3a8a; --light-blue: #3b82f6; --text-gray: #64748b; --border: #e2e8f0; --danger: #ef4444; }
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { background: white; width: 100%; max-width: 550px; border-radius: 40px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-style: italic; font-weight: 900; font-size: 32px; color: var(--blue); margin: 0; }
        .version { color: var(--light-blue); font-size: 10px; font-weight: bold; letter-spacing: 2px; }

        .tabs { display: flex; background: #f1f5f9; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; color: #64748b; font-size: 14px; transition: 0.3s; }
        .tab.active { background: white; color: var(--light-blue); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .full { grid-column: span 2; }
        label { font-size: 11px; font-weight: 700; color: var(--text-gray); margin-bottom: 6px; display: block; }
        input, select { width: 100%; box-sizing: border-box; border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-weight: bold; font-size: 14px; background: #fff; text-align: center; }

        .stock-card { border: 1px solid var(--border); border-radius: 24px; margin-bottom: 30px; overflow: hidden; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .stock-info { background: #f59e0b; color: white; padding: 15px 20px; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; }
        .stock-details { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 15px; background: #fafafa; border-bottom: 1px solid #eee; }
        .detail-item { text-align: center; }
        .detail-item div:first-child { font-size: 10px; color: #94a3b8; margin-bottom: 4px; }
        .detail-item div:last-child { font-size: 15px; font-weight: bold; color: var(--blue); }

        canvas { width: 100%; height: 300px; display: block; }

        .instruction-box { background: #fdfdfd; border: 1px dashed #cbd5e1; border-radius: 15px; padding: 15px; margin-top: 15px; }
        .instruction-box p { margin: 6px 0; font-size: 13px; color: #475569; line-height: 1.5; }
        .highlight { font-weight: 800; color: #1d4ed8; }

        .btn { background: #1d4ed8; color: white; border: none; width: 100%; padding: 22px; border-radius: 20px; font-size: 18px; font-weight: 900; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn:hover { background: #1e40af; transform: translateY(-2px); }
        .footer { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1><i>Ben</i> 專業報價系統</h1>
        <div class="version">DIGITAL NOTE PRESET V21.0</div>
    </div>

    <div class="tabs">
        <div id="tUS" class="tab active" onclick="setMode('US')">US 美股</div>
        <div id="tJP" class="tab" onclick="setMode('JP')">JP 日股</div>
    </div>

    <div class="input-grid">
        <div class="box full"><label>發行機構 (Issuers)</label>
            <select id="issuer">
                <option>MS (Morgan Stanley)</option><option>JPM (JP Morgan)</option>
                <option>BNP (BNP Paribas)</option><option>UBS</option>
                <option>NX (Natixis)</option><option>NO (Nomura)</option>
                <option>CG (Citigroup)</option><option>GS (Goldman Sachs)</option>
                <option>BAR (Barclays)</option><option>CA (Credit Agricole)</option><option>DBS</option>
            </select>
        </div>
        <div class="box full"><label>標的清單 (AAPL, NVDA, TSM, MSFT)</label><input type="text" id="tk" value="TSLA, NVDA, AAPL, MSFT"></div>
        <div class="box full"><label>預期表現 % (對應上方順序)</label><input type="text" id="perfs" value="45, 10, 60, 5"></div>
        <div class="box"><label>商品天期 (月)</label><input type="number" id="tenor" value="6"></div>
        <div class="box"><label>實際紅利率 (%)</label><input type="number" id="rate" value="10"></div>
        <div class="box full"><label>履約價 (Strike %)</label><input type="number" id="st" value="75"></div>
    </div>

    <div id="stock-list"></div>

    <div class="instruction-box" id="summary-box" style="display:none;">
        <p>💡 <b>收益判定說明</b></p>
        <p>1. 只要所有標的高於 <span class="highlight" id="lbl-st">75</span>%，領取實際紅利 <span class="highlight" id="lbl-rt">10</span>%。</p>
        <p>2. 若標的漲幅超過實際紅利，則參與市場表現，<span class="highlight">漲多少拿多少</span>。</p>
        <p>3. 此報價不含 KO/KI 條件，僅以履約價作為保本門檻。</p>
    </div>

    <button class="btn" onclick="renderReport()">生成 FCN 風格報價單</button>
    <div class="footer">Total Assets: USD 美元 / JPY 日幣</div>
</div>

<script>
    function setMode(m) {
        document.getElementById('tUS').className = m==='US'?'tab active':'tab';
        document.getElementById('tJP').className = m==='JP'?'tab active':'tab';
        document.getElementById('tk').value = (m === 'US') ? "TSLA, NVDA, AAPL, MSFT" : "7203.T, 9984.T, 6758.T, 8035.T";
    }

    function renderReport() {
        const container = document.getElementById('stock-list');
        const tickers = document.getElementById('tk').value.split(',').map(s => s.trim());
        const perfs = document.getElementById('perfs').value.split(',').map(v => parseFloat(v));
        const strike = parseFloat(document.getElementById('st').value);
        const rate = parseFloat(document.getElementById('rate').value);
        const tenor = parseInt(document.getElementById('tenor').value);

        container.innerHTML = '';
        document.getElementById('summary-box').style.display = 'block';
        document.getElementById('lbl-st').innerText = strike;
        document.getElementById('lbl-rt').innerText = rate;

        tickers.forEach((name, idx) => {
            const currentPrice = (Math.random() * 200 + 100).toFixed(2);
            const strikePrice = (currentPrice * (strike/100)).toFixed(2);
            const expPerf = perfs[idx] || 0;

            const card = document.createElement('div');
            card.className = 'stock-card';
            card.innerHTML = `<div class="stock-info">${name}</div>
                <div class="stock-details">
                    <div class="detail-item"><div>即時期初價</div><div>${currentPrice}</div></div>
                    <div class="detail-item"><div>履約價 (${strike}%)</div><div>${strikePrice}</div></div>
                    <div class="detail-item"><div>預期表現</div><div style="color:${expPerf>=0?'#10b981':'#ef4444'}">${expPerf}%</div></div>
                </div>
                <canvas id="chart-${idx}" width="500" height="300"></canvas>`;
            container.appendChild(card);
            drawFCNStyleChart(`chart-${idx}`, strike, expPerf, tenor);
        });
    }

    function drawFCNStyleChart(canvasId, strikePct, targetPerf, months) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        const padL = 60, padR = 40, padT = 40, padB = 50;
        const chartW = w - padL - padR, chartH = h - padT - padB;

        // Y 軸設定：從 Strike% 標註到 170% (+70%)
        const maxY = 170, minY = Math.min(strikePct - 5, 80);
        const range = maxY - minY;
        function getYY(pct) { return padT + chartH * (maxY - pct) / range; }

        // 1. 繪製背景格線與 Y 軸刻度 (每 5%)
        ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 1;
        ctx.fillStyle = '#94a3b8'; ctx.font = '11px Arial';
        for (let p = 70; p >= -30; p -= 5) {
            let actualPct = 100 + p; if (actualPct < minY - 2) continue;
            let yy = getYY(actualPct);
            ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(w - padR, yy); ctx.stroke();
            ctx.fillText((p > 0 ? "+" : "") + p + "%", 15, yy + 4);
        }

        // 2. 繪製 X 軸刻度 (月份)
        for (let m = 0; m <= months; m++) {
            let xx = padL + (chartW / months) * m;
            ctx.fillText(m + "m", xx - 5, h - 20);
        }

        // 3. 期初 100% 基準線
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(padL, getYY(100)); ctx.lineTo(w - padR, getYY(100)); ctx.stroke();

        // 4. 履約價 Strike 紅線 (唯一條件線)
        ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(padL, getYY(strikePct)); ctx.lineTo(w - padR, getYY(strikePct)); ctx.stroke();
        ctx.fillStyle = '#ef4444';
        ctx.fillText("STRIKE", w - padR + 5, getYY(strikePct) + 4);
        ctx.setLineDash([]);

        // 5. 繪製 FCN 風格折線 (模擬真實走勢)
        ctx.strokeStyle = '#1d4ed8'; ctx.lineWidth = 3; ctx.beginPath();
        ctx.moveTo(padL, getYY(100));
        const steps = 60;
        for (let i = 1; i <= steps; i++) {
            let xx = padL + (chartW / steps) * i;
            let currentPoint = 100 + (targetPerf * (i / steps)) + (Math.random() - 0.5) * 6;
            ctx.lineTo(xx, getYY(currentPoint));
        }
        ctx.stroke();

        // 標記終點
        ctx.fillStyle = '#1d4ed8';
        ctx.beginPath(); ctx.arc(padL + chartW, getYY(100 + targetPerf), 5, 0, Math.PI*2); ctx.fill();
    }
</script>
</body>
</html>
