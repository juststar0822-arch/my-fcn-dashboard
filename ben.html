<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Ben 進化型紅利商品報價</title>
    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --success: #188038; --gold: #f2994a; }
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #f8f9fa; padding: 20px; }
        .card { max-width: 950px; margin: auto; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .top-nav { background: #202124; color: white; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        input { padding: 8px; border-radius: 4px; border: none; margin-top: 5px; }
        
        .main-content { padding: 30px; text-align: center; }
        .badge { display: inline-block; padding: 10px 25px; border-radius: 50px; font-weight: bold; margin-bottom: 25px; font-size: 18px; }
        .badge-normal { background: #e8f0fe; color: var(--primary); }
        .badge-ki { background: var(--danger); color: white; }
        .badge-win { background: var(--gold); color: white; box-shadow: 0 0 15px rgba(242,153,74,0.5); }

        .stock-row { display: flex; justify-content: center; gap: 15px; margin: 25px 0; flex-wrap: wrap; }
        .stock-card { width: 150px; border: 2px solid #eee; padding: 15px; border-radius: 12px; }
        .stock-card.worst { border-color: var(--danger); background: #fff5f5; position: relative; }
        .stock-card.worst::after { content: "Worst"; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }

        .asset-box { display: flex; justify-content: space-around; background: #f1f3f4; padding: 30px; border-radius: 12px; margin-top: 20px; }
        .val { font-size: 36px; font-weight: bold; color: var(--primary); }
        .note { color: var(--success); font-weight: bold; margin-top: 10px; }
        
        .btn-group { margin-top: 30px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 0 5px; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="card">
    <div class="top-nav">
        <div class="input-group"><label>本金 (USD)</label><input type="number" id="p" value="100000"></div>
        <div class="input-group"><label>紅利率 (%)</label><input type="number" id="rate" value="46.06"></div>
        <div class="input-group"><label>USD/JPY 匯率</label><input type="number" id="fx" value="150"></div>
        <div class="input-group">
            <label>標的數量</label>
            <select id="count" onchange="createInputs()" style="padding:8px; border-radius:4px; margin-top:5px;">
                <option value="2">2檔</option><option value="3">3檔</option>
                <option value="4">4檔</option><option value="5" selected>5檔</option>
            </select>
        </div>
    </div>

    <div id="inputs" style="padding: 15px; background: #3c4043; color: white; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;"></div>

    <div class="main-content">
        <div id="status" class="badge badge-normal">狀態：觀測中</div>
        
        <div class="stock-row" id="stocks"></div>

        <div class="asset-box">
            <div class="currency">
                <div>結算資產 (USD)</div>
                <div id="res_usd" class="val">$0</div>
                <div id="reason_usd" class="note">✅ 領取 46.06% 高額紅利</div>
            </div>
            <div class="currency">
                <div>結算資產 (JPY)</div>
                <div id="res_jpy" class="val">¥0</div>
                <div id="reason_jpy" class="note">✅ 領取 46.06% 高額紅利</div>
            </div>
        </div>

        <div class="btn-group">
            <button onclick="setMarket(1)" style="background: #ddd;">溫和上漲 (漲 1%)</button>
            <button onclick="setMarket(60)" style="background: var(--gold); color: white;">市場大漲 (漲 60%)</button>
            <button onclick="setMarket(-30)" style="background: var(--danger); color: white;">觸及 KI (跌 30%)</button>
        </div>
    </div>
</div>

<script>
    function createInputs() {
        const count = document.getElementById('count').value;
        const container = document.getElementById('inputs');
        container.innerHTML = '';
        for(let i=1; i<=count; i++) {
            container.innerHTML += `
                <div style="border:1px solid #666; padding:5px; border-radius:5px;">
                    <input type="text" id="n${i}" value="標的 ${i}" style="width:70px; font-size:12px;">
                    <input type="number" id="v${i}" value="1" style="width:50px;" oninput="calc()"> %
                </div>`;
        }
        calc();
    }

    function calc() {
        const p = parseFloat(document.getElementById('p').value);
        const r = parseFloat(document.getElementById('rate').value) / 100;
        const fx = parseFloat(document.getElementById('fx').value);
        const count = document.getElementById('count').value;
        
        let perfs = [];
        for(let i=1; i<=count; i++) perfs.push(parseFloat(document.getElementById(`v${i}`).value) / 100);
        
        const worst = Math.min(...perfs);
        let finalReturn = r / 12; // 一個月
        let status = "狀態：觀測中 (實拿紅利)";
        let sClass = "badge-normal";
        let note = `✅ 即使漲幅小，依然實拿 ${ (r*100).toFixed(2) }% 紅利`;

        if (worst < -0.2) {
            finalReturn = worst;
            status = "已觸及 KI (永久標記)";
            sClass = "badge-ki";
            note = "❌ 看錯方向：紅利取消 / 轉換股票";
        } else if (worst > (r/12)) {
            finalReturn = worst;
            status = "超越紅利：參與市場漲幅";
            sClass = "badge-win";
            note = `🚀 表現優異：直接獲取 ${(worst*100).toFixed(2)}% 漲幅`;
        }

        const total = p * (1 + finalReturn);
        document.getElementById('res_usd').innerText = '$' + total.toLocaleString(undefined, {maximumFractionDigits:0});
        document.getElementById('res_jpy').innerText = '¥' + (total * fx).toLocaleString(undefined, {maximumFractionDigits:0});
        document.getElementById('status').innerText = status;
        document.getElementById('status').className = "badge " + sClass;
        document.getElementById('reason_usd').innerText = note;
        document.getElementById('reason_jpy').innerText = note;

        document.getElementById('stocks').innerHTML = perfs.map((v, i) => `
            <div class="stock-card ${v == worst ? 'worst' : ''}">
                <div style="font-size:12px; color:#666;">${document.getElementById(`n${i+1}`).value}</div>
                <div style="font-size:20px; font-weight:bold; color:${v>=0?'var(--success)':'var(--danger)'}">${(v*100).toFixed(1)}%</div>
            </div>
        `).join('');
    }

    function setMarket(val) {
        for(let i=1; i<=document.getElementById('count').value; i++) {
            document.getElementById(`v${i}`).value = (val + (Math.random() * 5)).toFixed(1);
        }
        calc();
    }

    createInputs();
</script>
</body>
</html>
