<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Ben 專業結構商品模擬器</title>
    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --success: #188038; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 900px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden; }
        .input-panel { padding: 20px; background: #e8f0fe; border-bottom: 2px solid #ddd; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        
        .display-panel { padding: 30px; }
        .header { text-align: center; margin-bottom: 30px; }
        .ki-status { display: inline-block; padding: 5px 15px; border-radius: 5px; background: #eee; font-weight: bold; }
        .is-ki { background: var(--danger); color: white; }
        
        .result-card { display: flex; justify-content: space-around; margin-top: 20px; }
        .currency-box { text-align: center; flex: 1; border: 2px solid #eee; margin: 0 10px; padding: 20px; border-radius: 12px; }
        .val { font-size: 24px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        
        .worst-label { color: var(--danger); font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="input-panel">
        <div class="input-group"><label>本金 (USD)</label><input type="number" id="principal" value="100000"></div>
        <div class="input-group"><label>美股標的 (Ticker)</label><input type="text" id="stockA" value="NVDA"></div>
        <div class="input-group"><label>日股標的 (Ticker)</label><input type="text" id="stockB" value="Toyota"></div>
        <div class="input-group"><label>年化紅利率 (%)</label><input type="number" id="rate" value="46.06"></div>
        <div class="input-group"><label>USD/JPY 匯率</label><input type="number" id="fx" value="150"></div>
    </div>

    <div class="display-panel">
        <div class="header">
            <h2>客製化報價：<span id="titleA">NVDA</span> + <span id="titleB">Toyota</span></h2>
            <div id="ki_flag" class="ki-status">狀態：觀測中</div>
        </div>

        <div class="result-card">
            <div class="currency-box">
                <div class="stat-label">預計領回 (USD)</div>
                <div id="res_usd" class="val">$103,838</div>
                <div class="worst-label" id="note_usd">✅ 到期還本</div>
            </div>
            <div class="currency-box">
                <div class="stat-label">預計領回 (JPY)</div>
                <div id="res_jpy" class="val">¥15,575,700</div>
                <div class="worst-label" id="note_jpy">✅ 到期還本</div>
            </div>
        </div>

        <div style="margin-top: 30px; padding: 15px; background: #fff4f4; border-radius: 8px;">
            <h4 style="color: var(--danger); margin: 0;">⚠️ 風險警示 (看錯方向時)：</h4>
            <p style="font-size: 14px;">若任一標的觸及 KI，本金將 <b>[不予歸還]</b>，亦 <b>[不發放紅利]</b>。系統將永久標記該資料，並以表現最差之標的進行實物交割。</p>
            <button onclick="simulateCrash()">模擬看錯方向 (觸及 KI)</button>
            <button onclick="resetSim()">重置正常狀態</button>
        </div>
    </div>
</div>

<script>
    function update() {
        let p = parseFloat(document.getElementById('principal').value);
        let r = parseFloat(document.getElementById('rate').value) / 100;
        let fx = parseFloat(document.getElementById('fx').value);
        let monthly = p * (1 + r/12);
        
        document.getElementById('titleA').innerText = document.getElementById('stockA').value;
        document.getElementById('titleB').innerText = document.getElementById('stockB').value;
        
        document.getElementById('res_usd').innerText = '$' + monthly.toLocaleString(undefined, {maximumFractionDigits:0});
        document.getElementById('res_jpy').innerText = '¥' + (monthly * fx).toLocaleString(undefined, {maximumFractionDigits:0});
    }

    function simulateCrash() {
        document.getElementById('ki_flag').innerText = "已觸及 KI (永久標記)";
        document.getElementById('ki_flag').className = "ki-status is-ki";
        document.getElementById('res_usd').innerText = "接股票 (市值視股價而定)";
        document.getElementById('res_jpy').innerText = "接股票 (市值視股價而定)";
        document.getElementById('note_usd').innerText = "❌ 紅利已取消";
        document.getElementById('note_jpy').innerText = "❌ 紅利已取消";
    }

    function resetSim() {
        document.getElementById('ki_flag').innerText = "狀態：觀測中";
        document.getElementById('ki_flag').className = "ki-status";
        document.getElementById('note_usd').innerText = "✅ 到期還本";
        document.getElementById('note_jpy').innerText = "✅ 到期還本";
        update();
    }

    document.querySelectorAll('input').forEach(el => el.addEventListener('input', update));
    update();
</script>

</body>
</html>
