<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Ben FCN 專業報價系統 V12.0</title>
    <style>
        :root { --blue: #1e3a8a; --light-blue: #3b82f6; --text-gray: #64748b; --border: #e2e8f0; }
        body { font-family: -apple-system, sans-serif; background: #f1f5f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { background: white; width: 100%; max-width: 500px; border-radius: 30px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        .header h1 { font-style: italic; font-weight: 900; font-size: 26px; color: #1a2a4e; margin: 0; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .full { grid-column: span 2; }
        label { font-size: 11px; font-weight: bold; color: var(--text-gray); margin-bottom: 5px; display: block; }
        input { width: 100%; box-sizing: border-box; border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; font-weight: bold; font-size: 14px; }

        /* 標的資訊與走勢圖卡片 */
        .stock-card { border: 1px solid var(--border); border-radius: 15px; margin-bottom: 15px; overflow: hidden; }
        .stock-info { background: #fbbf24; padding: 8px 15px; font-weight: bold; display: flex; justify-content: space-between; }
        .stock-details { display: flex; padding: 10px; background: #fff; border-bottom: 1px solid #f1f5f9; }
        .detail-item { flex: 1; text-align: center; border-right: 1px solid #eee; }
        .detail-item:last-child { border-right: none; }
        .detail-item div:first-child { font-size: 10px; color: #94a3b8; }
        .detail-item div:last-child { font-size: 13px; font-weight: bold; }

        canvas { width: 100%; height: 160px; background: #fff; display: block; }
        
        .btn { background: #1d4ed8; color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>FCN專業報價系統</h1>
        <p style="color:#3b82f6; font-size:10px; font-weight:bold; letter-spacing:2px; margin:5px 0;">STABILITY TERMINAL V12.0</p>
    </div>

    <div class="input-grid">
        <div class="box full"><label>連結標的 (如: 7011, 7013)</label><input type="text" id="tk" value="7011, 7013, 8697"></div>
        <div class="box"><label>商品天期 (月)</label><input type="number" id="tenor" value="6"></div>
        <div class="box"><label>履約價 (Strike %)</label><input type="number" id="st" value="75"></div>
        <div class="box"><label>年化紅利率 (%)</label><input type="number" id="rate" value="11.25"></div>
        <div class="box"><label>最新匯率 (USD/JPY)</label><input type="number" id="fx" value="150.5"></div>
    </div>

    <div id="stock-list"></div>

    <button class="btn" onclick="renderReport()">生成 FCN 專業報價單</button>
</div>

<script>
    function renderReport() {
        const container = document.getElementById('stock-list');
        const tickers = document.getElementById('tk').value.split(',').map(s => s.trim());
        const strike = parseFloat(document.getElementById('st').value);
        const tenor = document.getElementById('tenor').value;
        container.innerHTML = '';

        tickers.forEach((name, idx) => {
            // 模擬最新股價數據
            const basePrice = (Math.random() * 3000 + 1000).toFixed(2);
            const strikePrice = (basePrice * (strike/100)).toFixed(2);
            
            const card = document.createElement('div');
            card.className = 'stock-card';
            card.innerHTML = `
                <div class="stock-info">標的 ${idx + 1}：${name}</div>
                <div class="stock-details">
                    <div class="detail-item"><div>最新收盤價</div><div>${basePrice}</div></div>
                    <div class="detail-item"><div>期初價 (100%)</div><div>${basePrice}</div></div>
                    <div class="detail-item"><div>履約價 (${strike}%)</div><div>${strikePrice}</div></div>
                </div>
                <canvas id="chart-${idx}"></canvas>
            `;
            container.appendChild(card);
            drawStaticChart(`chart-${idx}`, strike);
        });
    }

    function drawStaticChart(canvasId, strikePct) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;
        const zeroY = h * 0.4; // 100% 基準線位置
        const strikeY = zeroY + (h * (100 - strikePct) / 100);

        // 1. 畫基準線 (期初與履約)
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = '#94a3b8'; // 100% 線
        ctx.beginPath(); ctx.moveTo(0, zeroY); ctx.lineTo(w, zeroY); ctx.stroke();
        
        ctx.strokeStyle = '#f59e0b'; // Strike 線
        ctx.beginPath(); ctx.moveTo(0, strikeY); ctx.lineTo(w, strikeY); ctx.stroke();
        ctx.setLineDash([]);

        // 2. 模擬波段走勢 (靜態)
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, zeroY + 20);
        
        let lastY = zeroY + 20;
        for(let i=1; i<=100; i++) {
            let x = (w / 100) * i;
            let change = (Math.random() - 0.45) * 6; // 模擬帶有上漲趨勢的波動
            lastY -= change;
            ctx.lineTo(x, lastY);
        }
        ctx.stroke();

        // 3. 文字標記
        ctx.fillStyle = '#64748b'; ctx.font = '12px Arial';
        ctx.fillText("期初價", 5, zeroY - 5);
        ctx.fillText("Strike", 5, strikeY - 5);
    }
</script>
</body>
</html>
