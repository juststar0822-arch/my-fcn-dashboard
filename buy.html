<!doctype html>
<html lang="zh-TW">
 <head>
  <meta charset="UTF-14">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCN 每日報價表</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; }
    .fcn-header { background: linear-gradient(135deg, #1a3a6b 0%, #1e4d8c 100%); }
    .row-border { border-bottom: 1px solid #e2e8f0; }
    .row-border:last-child { border-bottom: none; }
    .icon-box { width: 36px; height: 36px; min-width: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .icon-box svg { width: 18px; height: 18px; color: white; }
    .badge-pill { background: #1a3a6b; color: white; border-radius: 9999px; padding: 12px 24px; font-size: 20px; font-weight: 600; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 <script src="/_sdk/telemetry_sdk.js"></script></head>
 <body data-template-id="__page-root" class="min-h-screen">
  <main class="max-w-3xl mx-auto p-6">
   <header class="mb-8 text-center">
    <h1 data-template-id="page-title" class="canva-text text-7xl font-bold"></h1>
    <p data-template-id="page-subtitle" class="canva-text mt-3 opacity-70 text-2xl"></p>
   </header>
   <form id="fcn-form" class="space-y-4 mb-8 bg-white rounded-xl p-6 shadow">
    <div class="grid grid-cols-2 gap-4">
     <div><label data-template-id="label-date" class="canva-text block text-lg font-medium mb-2" for="qdate"></label><input id="qdate" type="date" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl focus:ring-2 focus:ring-blue-400 outline-none">
     </div>
     <div><label data-template-id="label-product-type" class="canva-text block text-lg font-medium mb-2" for="product-type"></label><select id="product-type" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl focus:ring-2 focus:ring-blue-400 outline-none"><option value="FCN" selected>FCN</option><option value="階梯式FCN">階梯式FCN</option></select>
     </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
     <div><label data-template-id="label-currency" class="canva-text block text-lg font-medium mb-2" for="currency"></label><select id="currency" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl focus:ring-2 focus:ring-blue-400 outline-none"><option value="美元" selected>美元</option><option value="日圓">日圓</option></select>
     </div>
     <div><label data-template-id="label-issuer" class="canva-text block text-lg font-medium mb-2" for="issuer"></label><select id="issuer" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl focus:ring-2 focus:ring-blue-400 outline-none"><option value="">選擇發行機構</option><option value="MS">MS（摩根士丹利）</option><option value="JPM">JPM（摩根大通）</option><option value="SG">SG（法國興業銀行）</option><option value="BNP">BNP（法國巴黎銀行）</option><option value="UBS">UBS（瑞銀集團）</option><option value="GS">GS（高盛）</option><option value="CA">CA（加拿大皇家銀行）</option><option value="DBS">DBS（星展銀行）</option><option value="BAR">BAR（巴克萊銀行）</option><option value="CS">CS（瑞信銀行）</option><option value="CG">CG（花旗集團）</option></select>
     </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
     <div><label data-template-id="label-tenor" class="canva-text block text-lg font-medium mb-2" for="tenor"></label><input id="tenor" type="text" placeholder="12 個月" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl focus:ring-2 focus:ring-blue-400 outline-none">
     </div>
     <div><label data-template-id="label-guaranteed-months" class="canva-text block text-lg font-medium mb-2" for="guaranteed-months"></label><select id="guaranteed-months" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl focus:ring-2 focus:ring-blue-400 outline-none"><option value="1">1 個月</option><option value="2">2 個月</option><option value="3">3 個月</option><option value="4">4 個月</option><option value="5">5 個月</option><option value="6">6 個月</option><option value="7">7 個月</option><option value="8">8 個月</option><option value="9">9 個月</option><option value="10">10 個月</option><option value="11">11 個月</option><option value="12" selected>12 個月</option></select>
     </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
     <div><label data-template-id="label-coupon" class="canva-text block text-lg font-medium mb-2" for="coupon"></label><input id="coupon" type="text" placeholder="10.00%" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl focus:ring-2 focus:ring-blue-400 outline-none">
     </div>
     <div><label class="canva-text block text-lg font-medium mb-2" for="ko-value">KO（提前出場價）</label><input id="ko-value" type="text" placeholder="150.00%" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl focus:ring-2 focus:ring-blue-400 outline-none">
     </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
     <div><label data-template-id="label-strike" class="canva-text block text-lg font-medium mb-2" for="strike">履約價</label><input id="strike" type="text" placeholder="100.00%" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl focus:ring-2 focus:ring-blue-400 outline-none">
     </div>
     <div><label data-template-id="label-ki" class="canva-text block text-lg font-medium mb-2" for="ki-type"></label><select id="ki-type" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl focus:ring-2 focus:ring-blue-400 outline-none"><option value="">選擇 KI 類型</option><option value="EKI">EKI（到期觀察）</option><option value="AKI">AKI（每日觀察）</option></select>
     </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
     <div><label class="canva-text block text-lg font-medium mb-2" for="ki-value">KI（下限價）</label><input id="ki-value" type="text" placeholder="80.00%" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl focus:ring-2 focus:ring-blue-400 outline-none">
     </div>
     <div></div>
    </div>
    <div><label data-template-id="label-underlying" class="canva-text block text-lg font-medium mb-2" for="underlying"></label><input id="underlying" type="text" placeholder="Taiwan 50, S&amp;P 500, NASDAQ-100, EURO STOXX 50" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-xl focus:ring-2 focus:ring-blue-400 outline-none">
    </div><button data-template-id="generate-btn" type="submit" class="canva-button w-full py-3 rounded-xl font-bold text-lg shadow-lg hover:scale-[1.02] transition-transform"></button>
   </form><!-- Output Card -->
   <div id="quote-output" class="hidden">
    <div id="quote-card" class="rounded-2xl overflow-hidden shadow-2xl border border-gray-200">
     <!-- Header -->
     <div class="fcn-header p-5 flex flex-col items-center text-center">
      <div>
       <div class="flex items-baseline gap-2 justify-center">
        <span class="text-white text-3xl font-black tracking-tight">FCN</span> <span class="text-white text-xl font-bold">每日報價表</span>
       </div>
       <p class="text-blue-200 text-sm mt-1">境外結構型商品（Fixed Coupon Note）</p>
      </div>
     </div><!-- Table Body - Two Column Grid -->
     <div class="bg-white grid grid-cols-2 gap-0">
      <!-- Left Column -->
      <div class="border-r border-b border-gray-200"><!-- Row: Date -->

         </svg>
        </div>

         <p class="font-bold text-xl text-gray-900">報價日期</p>

         <span id="out-date" class="font-black text-xl text-gray-900"></span>
        </div>
       </div><!-- Row: Product Type -->
       <div class="flex items-start px-4 py-3 border-b border-gray-200">
        <div class="icon-box bg-blue-700 mr-3 mt-1 flex-shrink-0">
         <svg viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" />
         </svg>
        </div>
        <div class="flex-1 min-w-0">
         <p class="font-bold text-xl text-gray-900">商品類型</p>
         <p class="text-sm text-gray-400">Product Type</p>
        </div>
        <div class="text-right flex-shrink-0 ml-2">
         <span id="out-type" class="font-bold text-lg text-gray-900"></span>
        </div>
       </div><!-- Row: Currency -->
       <div class="flex items-start px-4 py-3 border-b border-gray-200">
        <div class="icon-box bg-blue-700 mr-3 mt-1 flex-shrink-0">
         <svg viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
         </svg>
        </div>
        <div class="flex-1 min-w-0">
         <p class="font-bold text-xl text-gray-900">計價幣別</p>
         <p class="text-sm text-gray-400">Currency</p>
        </div>
        <div class="text-right flex-shrink-0 ml-2">
         <span id="out-currency" class="font-black text-xl text-gray-900"></span>
        </div>
       </div><!-- Row: Issuer -->
       <div class="flex items-start px-4 py-3 border-b border-gray-200">
        <div class="icon-box bg-blue-700 mr-3 mt-1 flex-shrink-0">
         <svg viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="14" rx="1" /><path d="M7 8V6a5 5 0 0 1 10 0v2" />
         </svg>
        </div>
        <div class="flex-1 min-w-0">
         <p class="font-bold text-xl text-gray-900">發行機構</p>
         <p class="text-sm text-gray-400">Issuing Institution</p>
        </div>
        <div class="text-right flex-shrink-0 ml-2">
         <span id="out-issuer" class="font-black text-xl text-gray-900"></span>
        </div>
       </div><!-- Row: Tenor -->
       <div class="flex items-start px-4 py-3">
        <div class="icon-box bg-blue-700 mr-3 mt-1 flex-shrink-0">
         <svg viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" />
         </svg>
        </div>
        <div class="flex-1 min-w-0">
         <p class="font-bold text-xl text-gray-900">商品天期</p>
         <p class="text-sm text-gray-400">Product Tenor</p>
        </div>
        <div class="text-right flex-shrink-0 ml-2">
         <span id="out-tenor" class="font-black text-xl text-gray-900"></span>
        </div>
       </div>
      </div><!-- Right Column -->
      <div class="border-b border-gray-200"><!-- Row: KO -->
       <div class="flex items-start px-4 py-3 border-b border-gray-200">
        <div class="icon-box bg-blue-700 mr-3 mt-1 flex-shrink-0">
         <svg viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M12 3v18" />
         </svg>
        </div>
        <div class="flex-1 min-w-0">
         <p class="font-bold text-xl text-gray-900">KO（提早出場）</p>
         <p class="text-sm text-gray-400">Knock-Out Level</p>
        </div>
        <div class="text-right flex-shrink-0 ml-2">
         <span id="out-ko" class="font-black text-xl text-gray-900"></span>
        </div>
       </div><!-- Row: Strike -->
       <div class="flex items-start px-4 py-3 border-b border-gray-200">
        <div class="icon-box bg-blue-700 mr-3 mt-1 flex-shrink-0">
         <svg viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
         </svg>
        </div>
        <div class="flex-1 min-w-0">
         <p class="font-bold text-xl text-gray-900">履約價</p>
         <p class="text-sm text-gray-400">Strike Price</p>
        </div>
        <div class="text-right flex-shrink-0 ml-2">
         <span id="out-strike" class="font-black text-xl text-gray-900"></span>
        </div>
       </div><!-- Row: KI -->
       <div class="flex items-start px-4 py-3 border-b border-gray-200">
        <div class="icon-box bg-blue-700 mr-3 mt-1 flex-shrink-0">
         <svg viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M12 3v18" />
         </svg>
        </div>
        <div class="flex-1 min-w-0">
         <p class="font-bold text-xl text-gray-900"><span id="out-ki-title">KI</span></p>
         <p class="text-sm text-gray-400">Knock-In Level</p>
        </div>
        <div class="text-right flex-shrink-0 ml-2">
         <span id="out-ki" class="font-black text-xl text-gray-900"></span>
        </div>
       </div><!-- Row: Guaranteed Coupon - Orange -->
       <div class="flex items-start px-4 py-3 bg-orange-50 border-b border-orange-200">
        <div class="icon-box bg-orange-500 mr-3 mt-1 flex-shrink-0">
         <svg viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L9.6 8.9H2.5L8.3 13.1L5.9 20L12 15.9L18.1 20L15.7 13.1L21.5 8.9H14.4L12 2Z" />
         </svg>
        </div>
        <div class="flex-1 min-w-0">
         <p class="font-bold text-xl text-orange-700">保證領息</p>
         <p class="text-sm text-orange-400">Guaranteed Coupon</p>
        </div>
        <div class="text-right flex-shrink-0 ml-2">
         <span id="out-guaranteed" class="font-black text-lg text-orange-600"></span>

       <div class="flex items-start px-4 py-3 bg-orange-50">
        <div class="icon-box bg-orange-500 mr-3 mt-1 flex-shrink-0">
         <svg viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="5" x2="5" y2="19" /><circle cx="6.5" cy="6.5" r="2.5" /><circle cx="17.5" cy="17.5" r="2.5" />
         </svg>
        </div>
        <div class="flex-1 min-w-0">
         <p class="font-bold text-xl text-orange-700">年化報酬率</p>
         <p class="text-sm text-orange-400">Coupon</p>
        </div>
        <div class="text-right flex-shrink-0 ml-2">
         <span id="out-coupon" class="font-black text-2xl text-orange-600"></span>
        </div>
       </div>
      </div><!-- Full Width Bottom Section -->
      <div class="col-span-2 flex items-start px-4 py-3 border-t border-gray-200">

       </div>

     </div><!-- Footer -->

  <script src="/_sdk/editing_sdk.js"></script>
  <script>
    document.getElementById('qdate').value = new Date().toISOString().split('T')[0];

    document.getElementById('fcn-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const dateVal = document.getElementById('qdate').value;
      const parts = dateVal.split('-');
      document.getElementById('out-date').textContent = parts[0] + '年' + parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
      document.getElementById('out-type').textContent = document.getElementById('product-type').value || '月配息型自動贖回 FCN';
      document.getElementById('out-currency').textContent = document.getElementById('currency').value || '美元';
      const issuerSelect = document.getElementById('issuer');
      const issuerCode = issuerSelect.value;
      const issuerOption = issuerSelect.options[issuerSelect.selectedIndex];
      document.getElementById('out-issuer').textContent = issuerOption.textContent || 'N/A';
      document.getElementById('out-tenor').textContent = document.getElementById('tenor').value || '12 個月';
      const formatPercent = (val) => {
        if (!val) return val;
        return val.replace(/\.?0+%/, '%');
      };

      const couponVal = document.getElementById('coupon').value || '10.00%';
      document.getElementById('out-coupon').textContent = formatPercent(couponVal) + '（年化）';
      
      const koVal = document.getElementById('ko-value').value || '100%';
      document.getElementById('out-ko').textContent = formatPercent(koVal);
      
      document.getElementById('out-strike').textContent = formatPercent(document.getElementById('strike').value || '100%');
      
      const kiType = document.getElementById('ki-type').value;
      const kiValue = document.getElementById('ki-value').value || '80%';
      let kiDisplay = formatPercent(kiValue);
      
      if (kiType === 'EKI') {
        document.getElementById('out-ki-title').textContent = 'EKI（到期觀察）';
      } else if (kiType === 'AKI') {
        document.getElementById('out-ki-title').textContent = 'AKI（每日觀察）';
      } else {
        document.getElementById('out-ki-title').textContent = 'KI';
      }
      
      document.getElementById('out-ki').textContent = kiDisplay;
      
      const months = document.getElementById('guaranteed-months').value;
      document.getElementById('out-guaranteed').textContent = `是（${months}個月）`;

      // Map of common stock/index names to Chinese translations
      const tickerMap = {
        'TSM': '台積電',
        'SPX': '標普500',
        'S&P': '標普500',
        'SP500': '標普500',
        'NDX': '那斯達克100',
        'NASDAQ': '那斯達克100',
        'NQ100': '那斯達克100',
        'NKY': '日經225',
        'N225': '日經225',
        'NIKKEI': '日經225',
        'TPX': '東證指數',
        'TOPIX': '東證指數',
        'STOXX': '歐洲STOXX 50',
        'EURO': '歐洲STOXX 50',
        'DAX': '德國DAX',
        'CAC': '法國CAC 40',
        'FTSE': '英國富時100',
        'ASX': '澳洲ASX 200',
        'HSI': '香港恆生',
        'HANG': '香港恆生',
        'KOSPI': '韓國KOSPI',
        'KOREA': '韓國KOSPI'
      };

      const underlying = (document.getElementById('underlying').value || 'TSM,NVDA,').split(',').map(s => s.trim()).filter(Boolean);
      const container = document.getElementById('out-underlying');
      container.innerHTML = '';
      
      underlying.forEach((item, index) => {
        if (index > 0) {
          const divider = document.createElement('div');
          divider.className = 'w-px h-6 bg-gray-300 mx-2';
          container.appendChild(divider);
        }
        
        const upperItem = item.toUpperCase();
        let chineseName = '';
        
        // Check if item contains any key from the map
        for (const [keyword, cn] of Object.entries(tickerMap)) {
          if (upperItem.includes(keyword)) {
            chineseName = cn;
            break;
          }
        }
        
        // Create wrapper for vertical layout
        const wrapper = document.createElement('div');
        wrapper.className = 'flex flex-col items-center';
        
        const englishText = document.createElement('span');
        englishText.className = 'font-bold text-2xl text-gray-900';
        englishText.textContent = upperItem;
        wrapper.appendChild(englishText);
        
        if (chineseName) {
          const chineseText = document.createElement('span');
          chineseText.className = 'font-bold text-xl text-gray-700 mt-1';
          chineseText.textContent = chineseName;
          wrapper.appendChild(chineseText);
        }
        
        container.appendChild(wrapper);
      });

      document.getElementById('quote-output').classList.remove('hidden');
      document.getElementById('quote-output').scrollIntoView({ behavior: 'smooth' });
    });
  </script>
