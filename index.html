<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上新莊分行 - FCN 管理系統 v58.AutoConditions</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        body { background-color: #f3f4f6; color: #1e293b; font-family: -apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; -webkit-font-smoothing: antialiased; }
        .fcn-card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #eee; position: relative; }
        .stock-tag { background: #f8fafc; border: 1.5px solid #edf2f7; border-radius: 14px; padding: 10px 4px; text-align: center; flex: 1; min-width: 105px; position: relative; }
        .stock-tag.ki-hit { border: 2px solid #ef4444; background-color: #fef2f2; }
        .stock-tag.ko-hit { border: 2px solid #3b82f6; background-color: #eff6ff; }
        .nav-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 8px; border-radius: 40px; display: flex; gap: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
        .nav-btn { padding: 10px 16px; border-radius: 30px; font-weight: 800; color: #64748b; transition: 0.2s; white-space: nowrap; font-size: 13px; cursor: pointer; }
        .nav-btn.active { background: #1f2937; color: white; }
        .risk-tab { padding: 12px 14px; font-weight: 800; color: #94a3b8; border-bottom: 3px solid transparent; flex: 1; text-align: center; font-size: 11px; white-space: nowrap; cursor: pointer; }
        .risk-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: rgba(37, 99, 235, 0.05); }
        .lock-badge { background: #fffbeb; color: #b45309; border: 1px solid #fef3c7; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .text-success { color: #10b981; font-weight: 900; }
        .text-danger { color: #ef4444; font-weight: 900; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .jpy-tag { color: #64748b; background: #f1f5f9; padding: 2px 6px; border-radius: 6px; font-weight: 900; }
        .usd-tag { color: #2563eb; background: #eff6ff; padding: 2px 6px; border-radius: 6px; font-weight: 900; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">
<div id="app" v-cloak class="max-w-4xl mx-auto">
    <template v-if="isLoggedIn">
        <!-- 導航列 -->
        <div class="nav-header sticky top-4 z-[1000] scrollbar-hide text-slate-800">
            <button @click="view = 'branch'" :class="['nav-btn', view === 'branch' ? 'active' : '']">資產管理</button>
            <button @click="view = 'client'" :class="['nav-btn', view === 'client' ? 'active' : '']">按客戶</button>
            <button @click="view = 'sales'" :class="['nav-btn', view === 'sales' ? 'active' : '']">按業務員</button>
            <button @click="view = 'alerts'" :class="['nav-btn', view === 'alerts' ? 'active' : '']">預警中心</button>
            <button @click="view = 'entry'" :class="['nav-btn', view === 'entry' ? 'active' : '']">資料輸入</button>
            <button @click="view = 'admin_panel'" :class="['nav-btn', view.includes('admin') ? 'active' : '']"><i class="fa-solid fa-gear text-lg"></i></button>
            <div class="ml-auto flex items-center pr-3">
                <i @click="fetchRealPrices" class="fa-solid fa-rotate text-blue-500 cursor-pointer text-lg" :class="{'animate-spin': isSyncing}"></i>
            </div>
        </div>

        <!-- 資料輸入/編輯 -->
        <div v-if="view === 'entry'" class="space-y-4 fade-in text-slate-800 text-left">
            
            <!-- 雙檔條件智慧整合面板 -->
            <div class="fcn-card border-4 border-dashed border-indigo-200 bg-indigo-50/20">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-black text-indigo-900 italic">⚡️ 雙檔條件比對器 (自動帶入標的、KO、履約、KI條件)</h2>
                    <span class="text-xs text-indigo-600 bg-indigo-100 px-3 py-1 rounded-full font-bold">手動填期初價</span>
                </div>
                <p class="text-xs text-slate-500 mb-4">比對後系統會自動對接標的名稱與合約條件比例（最多5檔），期初成交價留空供您手動對帳Key入。</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- 第一步：上傳客戶庫存 -->
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 text-center relative">
                        <span class="absolute top-2 left-2 text-[10px] bg-slate-200 px-2 py-0.5 rounded font-black text-slate-600">STEP 1</span>
                        <input type="file" id="clientInventoryFile" @change="handleClientInventoryUpload" accept=".xlsx, .xls" class="hidden">
                        <label for="clientInventoryFile" class="cursor-pointer block pt-2">
                            <i class="fa-solid fa-users text-blue-600 text-2xl mb-1 block"></i>
                            <span class="font-black text-sm block text-slate-700">上傳「客戶庫存表」</span>
                            <span class="text-[10px] text-gray-400 block mt-1 truncate">{{ clientFileName || '（含姓名、商品編碼等基本資料）' }}</span>
                        </label>
                    </div>

                    <!-- 第二步：上傳交易條件對照表 -->
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 text-center relative">
                        <span class="absolute top-2 left-2 text-[10px] bg-indigo-200 px-2 py-0.5 rounded font-black text-indigo-700">STEP 2</span>
                        <input type="file" id="termsMatchFile" @change="handleTermsMatchUpload" accept=".xlsx, .xls" class="hidden" :disabled="!rawClients.length">
                        <label for="termsMatchFile" :class="['cursor-pointer block pt-2', !rawClients.length ? 'opacity-40 cursor-not-allowed' : '']">
                            <i class="fa-solid fa-chart-line text-indigo-600 text-2xl mb-1 block"></i>
                            <span class="font-black text-sm block text-slate-700">上傳「交易條件對照表」</span>
                            <span class="text-[10px] text-gray-400 block mt-1 truncate">{{ termsFileName || '（含商品代碼、連結標的、KO/Strike/KI %）' }}</span>
                        </label>
                    </div>
                </div>

                <!-- 比對整合觸發鈕 -->
                <div v-if="rawClients.length > 0 || rawTerms.length > 0" class="mt-4 bg-white p-3 rounded-xl border border-slate-100 flex justify-between items-center text-xs">
                    <div class="space-y-1 font-bold text-slate-600">
                        <p>🔹 客戶庫存表基本資料：<span class="text-blue-600">{{ rawClients.length }} 筆</span></p>
                        <p>🔹 交易條件規格資料：<span class="text-indigo-600">{{ rawTerms.length }} 筆</span></p>
                    </div>
                    <button v-if="rawClients.length > 0 && rawTerms.length > 0" @click="runAutoMatch" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black px-5 py-2.5 rounded-xl shadow-md transition">
                        🚀 開始進行條件整合比對
                    </button>
                </div>
            </div>

            <!-- 補登期初價預覽工作區 -->
            <div v-if="stagingList.length > 0" class="fcn-card border-2 border-amber-300 bg-amber-50/20">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-black text-amber-800">✍️ 條件比對成功！請手動 Key 入客戶「期初成交價」</h3>
                    <button @click="stagingList = []" class="text-xs font-bold text-red-500 hover:underline">取消本次導入</button>
                </div>
                
                <div class="space-y-4 max-h-[550px] overflow-y-auto pr-2 scrollbar-thin">
                    <div v-for="(item, sIdx) in stagingList" :key="sIdx" class="bg-white border border-gray-200 p-5 rounded-2xl shadow-sm">
                        
                        <!-- 基本與整合條件資訊 -->
                        <div class="flex justify-between items-start mb-2 pb-2 border-b border-gray-100">
                            <div>
                                <span class="font-black text-slate-800 text-lg">{{ item.client }}</span>
                                <span class="text-xs text-gray-400 font-mono ml-2">商品編碼(SN): {{ item.sn }}</span>
                            </div>
                            <span class="lock-badge" v-if="item.currency">{{ item.currency }} · 業務: {{ item.sales }} · 金額: {{ formatNum(item.amount) }}萬</span>
                        </div>

                        <!-- 自動帶入的條對率預覽 -->
                        <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-500 font-bold mb-3 bg-slate-50 p-2 rounded-xl">
                            <span class="text-blue-600">已導入條件比例 ➔</span>
                            <span>KO 觸發: <b class="text-slate-800">{{ item.koP }}%</b></span>
                            <span>履約 Strike: <b class="text-slate-800">{{ item.strikeP }}%</b></span>
                            <span>KI 門檻: <b class="text-slate-800">{{ item.kiP }}%</b></span>
                        </div>
                        
                        <!-- 手動Key入期初成交價區域 -->
                        <div class="space-y-2">
                            <span class="text-xs font-black text-slate-400 uppercase tracking-widest">請輸入下列連結標的的期初成交價</span>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <div v-for="(st, stIdx) in item.stocks" :key="stIdx" class="flex gap-2 items-center bg-slate-50 p-2.5 rounded-xl border border-slate-100">
                                    <div class="w-1/3">
                                        <span class="block text-[10px] text-gray-400 font-bold">標的代號</span>
                                        <span class="font-black text-blue-600 uppercase text-xs block pt-1.5">{{ st.code }}</span>
                                    </div>
                                    <div class="flex-1">
                                        <label class="block text-[10px] text-indigo-500 font-bold">➔ 手動輸入：期初成交價格</label>
                                        <input type="number" step="0.0001" v-model.number="st.init" placeholder="Key 入期初價" class="w-full bg-white p-1.5 rounded-lg border border-indigo-200 font-black text-slate-800 text-xs outline-none focus:ring-2 ring-indigo-400">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-5 flex gap-3">
                    <button @click="commitStaging" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white p-3.5 rounded-2xl font-black text-center shadow-lg transition">
                        確認期初價無誤，正式匯入系統庫存
                    </button>
                </div>
            </div>

            <!-- 本地暫存與匯出控制 -->
            <div class="fcn-card">
                <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                    <div class="space-y-1">
                        <h3 class="font-black text-slate-800">目前資料（{{ inventory.length }} 筆）<span v-if="dirty" class="text-red-500 text-xs ml-1 align-middle animate-pulse">● 尚未儲存</span></h3>
                        <button v-if="inventory.length > 0" @click="clearAllInventory" class="bg-red-50 text-red-600 hover:bg-red-100 text-xs px-3 py-1.5 rounded-lg font-bold border border-red-200 transition">
                            <i class="fa-solid fa-trash mr-1"></i> 一鍵清空目前所有舊資料
                        </button>
                    </div>
                    <div class="flex gap-2 items-center flex-wrap">
                        <button @click="exportExcel" class="bg-emerald-600 text-white px-4 py-2 rounded-xl font-black text-sm hover:bg-emerald-700 transition">📊 匯出 Excel</button>
                        <button @click="downloadCSV" class="bg-slate-600 text-white px-4 py-2 rounded-xl font-black text-sm hover:bg-slate-700 transition">⬇️ 下載備份</button>
                        <input v-model="githubToken" type="password" placeholder="GitHub Token" class="text-xs bg-gray-100 p-2 rounded-lg w-36 font-mono outline-none border focus:border-blue-500">
                        <button @click="saveAllToGithub" :disabled="isUploading" :class="['px-4 py-2 rounded-xl font-black text-sm text-white transition', dirty ? 'bg-blue-600 animate-pulse' : 'bg-blue-600 hover:bg-blue-700']">
                            {{ isUploading ? '儲存中…' : '💾 儲存到 GitHub' }}
                        </button>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <div v-for="(it,idx) in inventory" :key="idx" class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl hover:bg-gray-100 transition">
                        <div class="min-w-0">
                            <b class="text-slate-800">{{ it.client }}</b> 
                            <span class="text-[11px] text-gray-400 font-bold ml-2">{{ it.sn }} · {{ (it.stocks||[]).map(s=>s.code).join('、') }}</span>
                        </div>
                        <div class="flex gap-3 flex-shrink-0">
                            <button @click="editEntry(idx)" class="text-blue-600 text-sm font-black hover:underline">編輯</button>
                            <button @click="deleteEntry(idx)" class="text-red-500 text-sm font-black hover:underline">刪除</button>
                        </div>
                    </div>
                    <div v-if="inventory.length===0" class="text-center text-gray-300 py-8 font-bold italic text-xs uppercase">No Data（資料庫為空）</div>
                </div>
            </div>
        </div>
    </template>
</div>

<script>
const { createApp } = Vue;

const stockNames = {
    '6146.T':'Disco','6501.T':'日立','7011.T':'三菱重工','6857.T':'愛德萬','7012.T':'川崎重工','7013.T':'IHI重工',
    '7974.T':'任天堂','8035.T':'東京威力','5803.T':'藤倉電子','8697.T':'日本交易所','8002.T':'丸紅','NVDA':'輝達',
    'TSLA':'特斯拉','TSM':'台積電','AMD':'超微','MU':'美光','ARM':'安謀','GOOG':'谷歌','AMZN':'亞馬遜',
    'AVGO':'博通','MSFT':'微軟','META':'臉書','DELL':'戴爾','ORCL':'甲骨文','OKLO':'Oklo','PLTR':'帕蘭提爾',
    'NFLX':'網飛','BRK.B':'波克夏'
};

const FcnUtils = {
    parseDate(str) {
        if (!str) return new Date();
        return new Date(String(str).replace(/-/g, '/').trim());
    },
    getSafeStartTs(dateObj) {
        const d = new Date(dateObj.getTime());
        d.setHours(0,0,0,0);
        return (d.getTime() / 1000) - 43200; 
    },
    isLocked(i) {
        if (!i.koStart) return false;
        try {
            return new Date() < FcnUtils.parseDate(i.koStart);
        } catch(e) { return false; }
    },
    getLowestSince(stock, startDate) {
        let minP = stock.current;
        if (stock.history && stock.history.timestamp) {
            const startTs = FcnUtils.getSafeStartTs(startDate);
            for (let j = 0; j < stock.history.timestamp.length; j++) {
                if (stock.history.timestamp[j] >= startTs) {
                    const low = stock.history.low[j];
                    if (low !== null && low < minP) minP = low;
                }
            }
        }
        return minP;
    },
    getHighestSince(stock, startDate) {
        let maxP = stock.current;
        if (stock.history && stock.history.timestamp) {
            const startTs = FcnUtils.getSafeStartTs(startDate);
            for (let j = 0; j < stock.history.timestamp.length; j++) {
                if (stock.history.timestamp[j] >= startTs) {
                    const high = stock.history.high[j];
                    if (high !== null && high > maxP) maxP = high;
                }
            }
        }
        return maxP;
    },
    formatNum(n) { 
        return n ? Math.floor(n).toLocaleString() : '0'; 
    },
    calcMonthly(i) { 
        const amount = i.amount || 0;
        const rawMonthly = (amount * 10000 * (i.coupon / 100)) / 12;
        return i.currency === 'JPY' ? Math.floor(rawMonthly) : parseFloat(rawMonthly.toFixed(2));
    }
};

const ClientCard = {
    props: ['item'],
    template: `
    <div class="fcn-card fade-in text-slate-800 border border-gray-100 shadow-sm text-left">
        <div v-if="isLocked(item)" class="absolute right-6 top-4"><span class="lock-badge"><i class="fa-solid fa-lock mr-1"></i>保證鎖定期</span></div>
        <div class="flex justify-between items-start mb-6">
            <div class="text-left text-slate-800">
                <h3 class="text-3xl font-black text-gray-800 tracking-tighter italic leading-none">{{ item.client }}</h3>
                <div class="flex items-center gap-1 mt-2 font-bold text-[10px] text-gray-400 uppercase tracking-widest text-slate-800">
                    {{ item.sn }} <span :class="[item.currency === 'JPY' ? 'jpy-tag' : 'usd-tag']">{{ item.currency }}</span>
                </div>
            </div>
            <div class="text-right">
                <div class="bg-indigo-50 text-indigo-600 text-[10px] px-2 py-1 rounded-lg font-black italic tracking-tighter text-center px-2 uppercase">票息: {{ item.coupon }}%</div>
                <div class="text-[9px] text-gray-400 font-bold mt-1 uppercase text-right tracking-tighter">業務: {{ item.sales }}</div>
            </div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-6 text-slate-800">
            <div v-for="s in (item.stocks || [])" :key="s.code" class="stock-tag" :class="getStockClass(item, s)">
                <div v-if="isStockKI(item, s)" class="absolute -top-3 right-0 bg-red-600 text-white text-[9px] px-2 py-0.5 rounded-full font-bold shadow-sm z-10">⚠ KI</div>
                <div v-if="isStockKO(item, s)" class="absolute -top-3 right-0 bg-blue-600 text-white text-[9px] px-2 py-0.5 rounded-full font-bold shadow-sm z-10">★ KO</div>
                <p class="text-[11px] font-black text-blue-500 leading-none uppercase">{{ s.code.replace('.T', '') }}</p>
                <p class="text-[9px] font-bold text-gray-400 mb-1 h-5 overflow-hidden text-ellipsis">{{ getStockName(s.code) }}</p>
                <p class="text-lg font-black leading-none my-1 tracking-tighter text-slate-800">{{ formatPrice(s.current) }}</p>
                <div class="text-[8px] font-bold text-gray-400 border-t border-gray-50 pt-1 mt-1 leading-tight">
                    <p>KO: <span class="text-slate-800 font-black">{{ formatPrice(s.init * (item.koP/100)) }}</span></p>
                    <p>KI: <span class="text-slate-800 font-black">{{ item.kiP > 0 ? formatPrice(s.init * (item.kiP/100)) : 'None' }}</span></p>
                </div>
                <p class="text-[11px] font-black mt-1" :class="perfColor(item, s)">{{ getPerf(item, s) }}%</p>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 border-t border-gray-100 pt-5 mb-4 text-[11px] font-bold text-gray-500">
            <div class="space-y-1 text-left text-slate-800">
                <p>下單日期: <span class="text-slate-900 font-black italic">{{ item.date || '---' }}</span></p>
                <p>庫存金額: <span class="text-slate-900 font-black italic">{{ (!item.amount) ? '交割中' : formatNum(item.amount) + ' 萬' }}</span></p>
                <p>到期日期: <span class="text-blue-500 font-black italic">{{ item.expiry }}</span></p>
            </div>
            <div class="text-right space-y-1">
                <p>月利率: {{ (item.coupon/12).toFixed(4) }}%</p>
                <p>預估月息: <span class="text-emerald-600 font-black text-xl italic text-right">{{ item.currency==='JPY'?'¥':'$' }}{{ formatNum(calcMonthly(item)) }}</span></p>
            </div>
        </div>
        <div class="flex justify-between items-center text-[9px] font-black bg-gray-50 p-3 rounded-2xl text-gray-400 uppercase tracking-widest italic">
            <span>KO: <span class="text-slate-800 font-black">{{ item.koP }}%</span></span><span>PUT: <span class="text-slate-800 font-black">{{ item.strikeP }}%</span></span><span :class="{'text-danger underline': hasBreachedKI(item)}">KI: {{ item.kiP }}%</span><span>START: <span class="text-slate-800 font-black text-right">{{ item.koStart }}</span></span>
        </div>
    </div>
    `,
    methods: {
        formatNum: FcnUtils.formatNum,
        calcMonthly: FcnUtils.calcMonthly,
        isLocked: FcnUtils.isLocked,
        formatPrice(n) {
            if (!n || n == 0) return '---';
            return (Math.floor(parseFloat(n) * 100) / 100).toFixed(2);
        },
        getStockName(c) { return stockNames[c] || c; },
        getPerf(i, s) {
            if (!s.init || !s.current || s.current <= 0) return '100.00';
            return ((s.current / s.init) * 100).toFixed(2);
        },
        perfColor(i, s) {
            if (!s.current || s.current <= 0) return 'text-gray-300';
            const p = parseFloat(this.getPerf(i, s));
            if (p >= i.koP) return 'text-success';
            if (p <= i.kiP) return 'text-danger';
            return 'text-gray-400';
        },
        hasBreachedKI(i) {
            if (!i.stocks || i.kiP <= 0) return false;
            const dateLimit = FcnUtils.parseDate(i.date);
            return i.stocks.some(s => {
                const lowest = FcnUtils.getLowestSince(s, dateLimit);
                return lowest > 0 && lowest <= (s.init * i.kiP / 100);
            });
        },
        getStockClass(i, s) {
            if (this.isStockKI(i, s)) return 'ki-hit';
            if (this.isStockKO(i, s)) return 'ko-hit';
            return '';
        },
        isStockKI(i, s) {
            if (i.kiP <= 0) return false;
            const dateLimit = FcnUtils.parseDate(i.date);
            const lowest = FcnUtils.getLowestSince(s, dateLimit);
            return lowest > 0 && lowest <= (s.init * i.kiP / 100);
        },
        isStockKO(i, s) {
            if (FcnUtils.isLocked(i)) return false;
            const start = FcnUtils.parseDate(i.koStart);
            const highest = FcnUtils.getHighestSince(s, start);
            return highest >= (s.init * i.koP / 100);
        }
    }
};

        totalJPY() { return this.inventory.filter(i => i.currency === 'JPY').reduce((s, i) => s + (i.amount||0), 0); },
        totalUSD() { return this.inventory.filter(i => i.currency === 'USD').reduce((s, i) => s + (i.amount||0), 0); },
        salesSummary() {
            const map = {}; 
            this.inventory.forEach(i => { if (i.sales) map[i.sales] = (map[i.sales] || 0) + 1; });
            return Object.keys(map).map(k => ({ name: k, count: map[k] })).sort((a,b) => b.count - a.count);
        },
        kiList() {
            return this.inventory.filter(i => {
                if (!i.stocks || i.kiP <= 0) return false;
                const dateLimit = FcnUtils.parseDate(i.date);
                return i.stocks.some(s => {
                    const lowest = FcnUtils.getLowestSince(s, dateLimit);
                    return lowest > 0 && lowest <= (s.init * i.kiP / 100);
                });
            });
        },
        observationList() {
            const now = new Date();
            return this.inventory.filter(i => {
                try {
                    if (!i.koStart || !i.stocks) return false;
                    const start = FcnUtils.parseDate(i.koStart);
                    if (isNaN(start.getTime())) return false;
                    const diff = Math.ceil((start - now) / 86400000);
                    if (diff < 0 || diff > 3) return false;
                    const koCount = i.stocks.filter(s => s.current > 0 && ((s.current/s.init)*100) >= i.koP).length;
                    const lastStock = i.stocks.find(s => s.current > 0 && ((s.current/s.init)*100) < i.koP);
                    const isNearPrice = lastStock && (lastStock.current / (lastStock.init * i.koP / 100)) >= 0.97;
                    return (i.stocks.length === koCount || (i.stocks.length - koCount === 1 && isNearPrice));
                } catch(e) { return false; }
            });
        },
        partKOList() {
            return this.inventory.filter(i => {
                if (FcnUtils.isLocked(i)) return false;
                if (this.exitList.includes(i)) return false;
                const start = FcnUtils.parseDate(i.koStart);
                return i.stocks && i.stocks.some(s => {
                    const highest = FcnUtils.getHighestSince(s, start);
                    return highest >= (s.init * i.koP / 100);
                });
            });
        },
        nearKOList() {
            return this.inventory.filter(i => {
                if (FcnUtils.isLocked(i)) return false;
                if (this.exitList.includes(i)) return false; 
                const start = FcnUtils.parseDate(i.koStart);
                const passedStocks = (i.stocks || []).filter(s => {
                    const highest = FcnUtils.getHighestSince(s, start);
                    return highest >= (s.init * i.koP / 100);
                });
                if (i.stocks.length - passedStocks.length !== 1) return false;
                const failedStock = i.stocks.find(s => {
                    const highest = FcnUtils.getHighestSince(s, start);
                    return highest < (s.init * i.koP / 100);
                });
                if (!failedStock) return false;
                return failedStock.current >= ((failedStock.init * i.koP / 100) * 0.97);
            });

                        this.inventory = results.data.map(row => {

                });

        async fetchRealPrices() {
            if (this.inventory.length === 0) return;
            this.isSyncing = true;
            try {
                const resp = await fetch('prices.json?v=' + Date.now()); if (!resp.ok) throw new Error();
                const payload = await resp.json(); const prices = payload.prices || {};
                this.inventory.forEach(item => { (item.stocks || []).forEach(stock => { const p = prices[stock.code]; if (p && p.current != null) { stock.current = p.current; stock.history = { timestamp: p.timestamp, high: p.high, low: p.low }; } }); });
                this.lastUpdated = new Date().toLocaleTimeString() + '（每日自動）';
            } catch (e) {
                const symbols = [...new Set(this.inventory.flatMap(i => (i.stocks || []).map(s => s.code)))];
                try {
                    await Promise.all(symbols.map(async (symbol) => {
                        try {
                            const ysym = symbol.endsWith('.T') ? symbol : symbol.replace('.', '-');
                            const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ysym}?interval=1d&range=2y`)}`);
                            const d = await r.json(); const j = JSON.parse(d.contents); const res = j.chart.result[0];
                            if (res.meta.regularMarketPrice) this.inventory.forEach(item => (item.stocks || []).forEach(stock => { if (stock.code === symbol) { stock.current = res.meta.regularMarketPrice; stock.history = { timestamp: res.timestamp, high: res.indicators.quote[0].high, low: res.indicators.quote[0].low }; } }));
                        } catch (err) {}
                    }));
                    this.lastUpdated = new Date().toLocaleTimeString() + '（即時）';
                } catch (e2) {}
            } finally { this.isSyncing = false; }
        }
    },
    mounted() {
        if (sessionStorage.getItem('fcn_auth') === 'true') this.isLoggedIn = true; this.loadCSVData();
        setInterval(() => this.fetchRealPrices(), 60000);
        window.addEventListener('beforeunload', (e) => { if (this.dirty) { e.preventDefault(); e.returnValue = '尚未儲存'; } });
    }
}).mount('#app');
</script>
</body>
</html>
