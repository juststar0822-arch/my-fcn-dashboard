<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上新莊分行 - FCN 管理系統 v58.Optimized</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        body { background-color: #f3f4f6; color: #1e293b; font-family: -apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; -webkit-font-smoothing: antialiased; }
        .fcn-card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #eee; position: relative; }
        .stock-tag { background: #f8fafc; border: 1.5px solid #edf2f7; border-radius: 14px; padding: 10px 4px; text-align: center; flex: 1; min-width: 105px; position: relative; }
        .stock-tag.ki-hit { border: 2px solid #ef4444; background-color: #fef2f2; }
        .stock-tag.ko-hit { border: 2px solid #3b82f6; background-color: #eff6ff; }
        .nav-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 8px; border-radius: 40px; display: flex; gap: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
        .nav-btn { padding: 10px 16px; border-radius: 30px; font-weight: 800; color: #64748b; transition: 0.2s; white-space: nowrap; font-size: 13px; cursor: pointer; }
        .nav-btn.active { background: #1f2937; color: white; }
        .risk-tab { padding: 12px 14px; font-weight: 800; color: #94a3b8; border-bottom: 3px solid transparent; flex: 1; text-align: center; font-size: 11px; white-space: nowrap; cursor: pointer; }
        .risk-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: rgba(37, 99, 235, 0.05); }
        .lock-badge { background: #fffbeb; color: #b45309; border: 1px solid #fef3c7; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .text-success { color: #10b981; font-weight: 900; }
        .text-danger { color: #ef4444; font-weight: 900; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .jpy-tag { color: #64748b; background: #f1f5f9; padding: 2px 6px; border-radius: 6px; font-weight: 900; }
        .usd-tag { color: #2563eb; background: #eff6ff; padding: 2px 6px; border-radius: 6px; font-weight: 900; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">
<div id="app" v-cloak class="max-w-4xl mx-auto">
    <!-- 登入模組 -->
    <div v-if="!isLoggedIn" class="fixed inset-0 bg-slate-900 z-[2000] flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-sm text-center shadow-2xl">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-6">
                <i class="fa-solid fa-lock text-2xl"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 italic">上新莊管理系統</h2>
            <input v-model="inputPass" type="password" @keyup.enter="login" placeholder="Password" class="w-full bg-slate-100 border-none p-4 rounded-2xl text-center text-3xl tracking-[0.4em] mb-6 outline-none focus:ring-2 ring-blue-500 font-mono">
            <button @click="login" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-lg hover:bg-slate-800 transition">LOGIN</button>
        </div>
    </div>

    <template v-if="isLoggedIn">
        <!-- 導航列 -->
        <div class="nav-header sticky top-4 z-[1000] scrollbar-hide text-slate-800">
            <button @click="view = 'branch'" :class="['nav-btn', view === 'branch' ? 'active' : '']">資產管理</button>
            <button @click="view = 'client'" :class="['nav-btn', view === 'client' ? 'active' : '']">按客戶</button>
            <button @click="view = 'sales'" :class="['nav-btn', view === 'sales' ? 'active' : '']">按業務員</button>
            <button @click="view = 'alerts'" :class="['nav-btn', view === 'alerts' ? 'active' : '']">預警中心</button>
            <button @click="view = 'entry'" :class="['nav-btn', view === 'entry' ? 'active' : '']">資料輸入</button>
            <button @click="view = 'admin_panel'" :class="['nav-btn', view.includes('admin') ? 'active' : '']"><i class="fa-solid fa-gear text-lg"></i></button>
            <div class="ml-auto flex items-center pr-3">
                <i @click="fetchRealPrices" class="fa-solid fa-rotate text-blue-500 cursor-pointer text-lg" :class="{'animate-spin': isSyncing}"></i>
            </div>
        </div>

        <div class="px-4 mb-4 flex justify-between items-center text-[10px] font-black italic tracking-widest text-gray-400 uppercase">
            <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[6px] text-green-500"></i> FCN Iron-Shield System</span>
            <span v-if="lastUpdated">Refreshed: {{ lastUpdated }}</span>
        </div>

        <!-- 預警中心 -->
        <div v-if="view === 'alerts'" class="space-y-4 fade-in">
            <div class="flex bg-white rounded-2xl shadow-sm mb-4 overflow-x-auto text-slate-800 scrollbar-hide border border-gray-100">
                <button @click="alertTab = 'ki'" :class="['risk-tab', alertTab === 'ki' ? 'active' : '']">觸及KI({{kiList.length}})</button>
                <button @click="alertTab = 'obs'" :class="['risk-tab', alertTab === 'obs' ? 'active' : '']">即將觀察({{observationList.length}})</button>
                <button @click="alertTab = 'pko'" :class="['risk-tab', alertTab === 'pko' ? 'active' : '']">曾經KO({{partKOList.length}})</button>
                <button @click="alertTab = 'nko'" :class="['risk-tab', alertTab === 'nko' ? 'active' : '']">即將KO({{nearKOList.length}})</button>
                <button @click="alertTab = 'exp'" :class="['risk-tab', alertTab === 'exp' ? 'active' : '']">到期({{expiringList.length}})</button>
                <button @click="alertTab = 'exit'" :class="['risk-tab', alertTab === 'exit' ? 'active' : '']">已出場({{exitList.length}})</button>
            </div>
            <div class="space-y-4">
                <client-card v-for="item in currentAlertList" :item="item" :key="item.sn + item.client"></client-card>
                <div v-if="currentAlertList.length === 0" class="text-center py-20 text-gray-300 font-bold italic uppercase text-xs tracking-widest">No Matches Found</div>
            </div>
        </div>

        <!-- 資產管理 -->
        <div v-if="view === 'branch'" class="space-y-4 fade-in">
            <h2 class="text-xl font-black px-2 italic uppercase text-slate-800 text-left tracking-tighter">Portfolio Summary</h2>
            <div v-for="curr in ['JPY', 'USD']" :key="curr" class="fcn-card shadow-xl text-white border-none" :class="curr==='JPY'?'bg-slate-800':'bg-blue-600'">
                <div class="flex justify-between items-start mb-4 opacity-80 text-xs font-bold uppercase text-white font-black">
                    <span>Portfolio size</span><span>{{ curr==='JPY'?countJPY:countUSD }}筆</span>
                </div>
                <div class="text-5xl font-black italic font-mono tracking-tighter text-white">
                    {{ curr==='JPY'?'¥':'$' }} {{ formatNum(curr==='JPY'?totalJPY:totalUSD) }} 
                    <span class="text-lg font-normal opacity-50 uppercase text-white">萬</span>
                </div>
            </div>
        </div>

        <!-- 按客戶 -->
        <div v-if="view === 'client'" class="space-y-4 fade-in">
            <input v-model="search" type="text" placeholder="🔍 Search Client or SN..." class="w-full p-4 rounded-3xl bg-white shadow-sm font-bold outline-none text-slate-800 pl-6">
            <client-card v-for="item in clientFilteredList" :item="item" :key="item.sn + item.client"></client-card>
        </div>

        <!-- 按業務員 -->
        <div v-if="view === 'sales'" class="space-y-4 fade-in text-slate-800 text-left">
            <select v-model="selectedSales" class="w-full p-4 rounded-3xl bg-white shadow-sm font-black text-blue-600 outline-none text-lg text-slate-800 font-mono">
                <option v-for="s in salesSummary" :value="s.name">{{ s.name }} ({{ s.count }} 筆)</option>
            </select>
            <client-card v-for="item in salesFilteredList" :item="item" :key="item.sn + item.client"></client-card>
        </div>

        <!-- 資料輸入/編輯 -->
        <div v-if="view === 'entry'" class="space-y-4 fade-in text-slate-800 text-left">
            
            <!-- Excel 批次導入控制區 (已完美對應分行欄位) -->
            <div class="fcn-card border-2 border-dashed border-blue-200 bg-blue-50/30">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-black text-slate-800 italic">📊 快速導入：上傳客戶庫存 Excel</h2>
                    <span class="text-xs text-blue-600 bg-blue-100 px-3 py-1 rounded-full font-bold">已支援「姓名/商品編碼」格式</span>
                </div>
                <p class="text-xs text-gray-400 mb-4">系統已針對您的分行庫存表進行欄位對接。上傳後，請在下方「待補登期初價」區塊填寫期初成交價格。</p>
                <div class="relative border border-slate-200 rounded-2xl p-6 bg-white text-center cursor-pointer hover:bg-slate-50 transition">
                    <input type="file" id="excelImportFile" @change="handleExcelImport" accept=".xlsx, .xls" class="hidden">
                    <label for="excelImportFile" class="cursor-pointer block font-bold text-slate-600">
                        <i class="fa-solid fa-file-excel text-emerald-600 text-2xl mb-2 block"></i>
                        選擇或拖曳客戶庫存 Excel 檔案
                    </label>
                </div>
            </div>

            <!-- 待補登期初價表格 (當 stagingList 有資料時顯示) -->
            <div v-if="stagingList.length > 0" class="fcn-card border-2 border-amber-300 bg-amber-50/20">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-black text-amber-800">✍️ 待補登期初成交價（共 {{ stagingList.length }} 筆）</h3>
                    <button @click="stagingList = []" class="text-xs font-bold text-red-500 hover:underline">清空暫存</button>
                </div>
                
                <div class="space-y-4 max-h-[500px] overflow-y-auto pr-2 scrollbar-thin">
                    <div v-for="(item, sIdx) in stagingList" :key="sIdx" class="bg-white border border-gray-200 p-4 rounded-2xl shadow-sm">
                        <div class="flex justify-between items-start mb-3 pb-2 border-b border-gray-100">
                            <div>
                                <span class="font-black text-slate-800 text-lg">{{ item.client }}</span>
                                <span class="text-xs text-gray-400 font-mono ml-2">商品編碼(SN): {{ item.sn }}</span>
                            </div>
                            <span class="lock-badge" v-if="item.currency">{{ item.currency }} · 業務: {{ item.sales }}</span>
                        </div>
                        
                        <!-- 填寫期初價輸入區 -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3">
                            <div v-for="(st, stIdx) in item.stocks" :key="stIdx" class="bg-slate-50 p-2.5 rounded-xl border border-slate-100">
                                <span class="text-[10px] font-black text-blue-500 block uppercase mb-1">標的: {{ st.code }}</span>
                                <label class="block">
                                    <span class="text-[9px] text-gray-400 font-bold">期初成交價:</span>
                                    <input type="number" step="0.01" v-model.number="st.init" placeholder="請輸入期初價" class="w-full bg-white p-1.5 rounded-lg border border-gray-200 font-bold text-sm outline-none focus:border-blue-500">
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-5 flex gap-3">
                    <button @click="commitStaging" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white p-3.5 rounded-2xl font-black text-center shadow-lg transition">
                        確認並匯入系統部位
                    </button>
                </div>
            </div>

            <!-- 手動單筆新增/編輯部位 -->
            <div class="fcn-card">
                <h2 class="text-xl font-black italic mb-4">{{ editIndex===null ? '➕ 手動新增部位' : '✏️ 編輯部位' }}</h2>
                <div class="grid grid-cols-2 gap-3 text-sm">
                    <label class="block font-bold text-gray-500">客戶<input v-model="form.client" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                    <label class="block font-bold text-gray-500">SN<input v-model="form.sn" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                    <label class="block font-bold text-gray-500">業務員<input v-model="form.sales" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                    <label class="block font-bold text-gray-500">幣別<select v-model="form.currency" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"><option>USD</option><option>JPY</option></select></label>
                    <label class="block font-bold text-gray-500">票息 %<input type="number" step="0.01" v-model.number="form.coupon" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                    <label class="block font-bold text-gray-500">庫存金額(萬)<input type="number" v-model.number="form.amount" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                    <label class="block font-bold text-gray-500">KO %<input type="number" step="0.01" v-model.number="form.koP" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                    <label class="block font-bold text-gray-500">KI %<input type="number" step="0.01" v-model.number="form.kiP" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                    <label class="block font-bold text-gray-500">PUT/履約 %<input type="number" step="0.01" v-model.number="form.strikeP" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                    <label class="block font-bold text-gray-500">觀察起日<input type="date" v-model="form.koStart" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                    <label class="block font-bold text-gray-500">下單日<input type="date" v-model="form.date" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                    <label class="block font-bold text-gray-500">到期日<input type="date" v-model="form.expiry" class="w-full mt-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800"></label>
                </div>
                
                <h3 class="font-black mt-5 mb-2 text-gray-500 text-sm">標的（最多 4 檔・日股代號自動轉大寫/補全 .T）</h3>
                <div class="space-y-2">
                    <div v-for="(st,idx) in form.stocks" :key="idx" class="flex gap-2 items-center">
                        <input v-model="st.code" @input="formatStockInput(st)" placeholder="代號 (例: 7974 或 NVDA)" class="flex-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-blue-600 uppercase">
                        <input type="number" step="0.01" v-model.number="st.init" placeholder="期初價" class="flex-1 bg-gray-100 p-2.5 rounded-xl outline-none font-black text-slate-800">
                        <button @click="form.stocks.splice(idx,1)" class="text-red-500 font-black px-2">✕</button>
                    </div>
                    <button v-if="form.stocks.length<4" @click="form.stocks.push({code:'',init:null})" class="text-blue-600 font-black text-sm">＋ 加一檔標的</button>
                </div>
                
                <div class="flex gap-2 mt-6">
                    <button @click="submitEntry" class="flex-1 bg-slate-900 text-white p-3.5 rounded-2xl font-black hover:bg-slate-800 transition">{{ editIndex===null ? '新增到列表' : '更新' }}</button>
                    <button v-if="editIndex!==null" @click="resetForm" class="bg-gray-200 text-gray-600 px-6 rounded-2xl font-black">取消</button>
                </div>
            </div>

            <!-- 本地暫存與匯出控制 -->
            <div class="fcn-card">
                <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                    <h3 class="font-black text-slate-800">目前資料（{{ inventory.length }} 筆）<span v-if="dirty" class="text-red-500 text-xs ml-1 align-middle animate-pulse">● 尚未儲存</span></h3>
                    <div class="flex gap-2 items-center flex-wrap">
                        <button @click="exportExcel" class="bg-emerald-600 text-white px-4 py-2 rounded-xl font-black text-sm hover:bg-emerald-700 transition">📊 匯出 Excel</button>
                        <button @click="downloadCSV" class="bg-slate-600 text-white px-4 py-2 rounded-xl font-black text-sm hover:bg-slate-700 transition">⬇️ 下載備份</button>
                        <div class="relative">
                            <input v-model="githubToken" type="password" placeholder="GitHub Token" class="text-xs bg-gray-100 p-2 rounded-lg w-36 font-mono outline-none border focus:border-blue-500">
                        </div>
                        <button @click="saveAllToGithub" :disabled="isUploading" :class="['px-4 py-2 rounded-xl font-black text-sm text-white transition', dirty ? 'bg-blue-600 animate-pulse' : 'bg-blue-600 hover:bg-blue-700']">
                            {{ isUploading ? '儲存中…' : '💾 儲存到 GitHub' }}
                        </button>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <div v-for="(it,idx) in inventory" :key="idx" class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl hover:bg-gray-100 transition">
                        <div class="min-w-0">
                            <b class="text-slate-800">{{ it.client }}</b> 
                            <span class="text-[11px] text-gray-400 font-bold ml-2">{{ it.sn }} · {{ (it.stocks||[]).map(s=>s.code).join('、') }}</span>
                        </div>
                        <div class="flex gap-3 flex-shrink-0">
                            <button @click="editEntry(idx)" class="text-blue-600 text-sm font-black hover:underline">編輯</button>
                            <button @click="deleteEntry(idx)" class="text-red-500 text-sm font-black hover:underline">刪除</button>
                        </div>
                    </div>
                    <div v-if="inventory.length===0" class="text-center text-gray-300 py-8 font-bold italic text-xs uppercase">No Data</div>
                </div>
                <p class="text-[11px] text-gray-400 mt-4 leading-relaxed">＊ 新增/編輯/刪除後，要按上面「儲存到 GitHub」才會永久保存。第一次使用請貼上 GitHub Token（會儲存在此瀏覽器本地）。</p>
            </div>
        </div>

        <!-- 管理面板安全驗證 -->
        <div v-if="view === 'admin_login'" class="fade-in max-w-sm mx-auto mt-10 text-center">
            <div class="fcn-card text-slate-800 text-center">
                <h3 class="font-black mb-4 text-gray-400 uppercase italic text-xs tracking-widest text-slate-800">Admin Security</h3>
                <input v-model="adminPassInput" type="password" @keyup.enter="checkAdminPass" class="w-full p-4 rounded-2xl bg-gray-100 mb-4 text-center font-mono outline-none border-2 focus:border-blue-500 text-slate-800 shadow-sm">
                <button @click="checkAdminPass" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-black shadow-lg hover:bg-slate-700 transition">VERIFY</button>
            </div>
        </div>

        <!-- 管理面板 -->
        <div v-if="view === 'admin_panel'" class="fade-in space-y-4 text-center text-slate-800 max-w-sm mx-auto">
            <div class="fcn-card text-slate-800 text-left">
                <h2 class="text-xl font-black italic mb-6 text-center">CSV DATA SYNC</h2>
                <div class="space-y-6 text-slate-800 font-mono">
                    <input v-model="githubToken" type="password" placeholder="GitHub Token" class="w-full bg-gray-50 p-3 rounded-xl border-none font-mono text-center text-sm text-slate-800">
                    <div class="border-4 border-dashed rounded-[2rem] p-10 cursor-pointer hover:bg-gray-50 text-slate-800 text-center relative">
                        <input type="file" id="csvFile" @change="handleFileUpload" class="hidden text-slate-800">
                        <label for="csvFile" class="block font-black text-gray-500 cursor-pointer">
                            {{ fileName ? '📄 ' + fileName : 'Choose data.csv' }}
                        </label>
                    </div>
                    <button @click="uploadToGithub" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black shadow-xl uppercase hover:bg-blue-700 transition">Sync GitHub</button>
                </div>
            </div>
        </div>
    </template>
</div>

<script>
const { createApp } = Vue;

const stockNames = {
    '6146.T':'Disco','6501.T':'日立','7011.T':'三菱重工','6857.T':'愛德萬','7012.T':'川崎重工','7013.T':'IHI重工',
    '7974.T':'任天堂','8035.T':'東京威力','5803.T':'藤倉電子','8697.T':'日本交易所','8002.T':'丸紅','NVDA':'輝達',
    'TSLA':'特斯拉','TSM':'台積電','AMD':'超微','MU':'美光','ARM':'安謀','GOOG':'谷歌','AMZN':'亞馬遜',
    'AVGO':'博通','MSFT':'微軟','META':'臉書','DELL':'戴爾','ORCL':'甲骨文','OKLO':'Oklo','PLTR':'帕蘭提爾',
    'NFLX':'網飛','BRK.B':'波克夏'
};

const FcnUtils = {
    parseDate(str) {
        if (!str) return new Date();
        return new Date(String(str).replace(/-/g, '/').trim());
    },
    getSafeStartTs(dateObj) {
        const d = new Date(dateObj.getTime());
        d.setHours(0,0,0,0);
        return (d.getTime() / 1000) - 43200; 
    },
    isLocked(i) {
        if (!i.koStart) return false;
        try {
            return new Date() < FcnUtils.parseDate(i.koStart);
        } catch(e) { return false; }
    },
    getLowestSince(stock, startDate) {
        let minP = stock.current;
        if (stock.history && stock.history.timestamp) {
            const startTs = FcnUtils.getSafeStartTs(startDate);
            for (let j = 0; j < stock.history.timestamp.length; j++) {
                if (stock.history.timestamp[j] >= startTs) {
                    const low = stock.history.low[j];
                    if (low !== null && low < minP) minP = low;
                }
            }
        }
        return minP;
    },
    getHighestSince(stock, startDate) {
        let maxP = stock.current;
        if (stock.history && stock.history.timestamp) {
            const startTs = FcnUtils.getSafeStartTs(startDate);
            for (let j = 0; j < stock.history.timestamp.length; j++) {
                if (stock.history.timestamp[j] >= startTs) {
                    const high = stock.history.high[j];
                    if (high !== null && high > maxP) maxP = high;
                }
            }
        }
        return maxP;
    },
    formatNum(n) { 
        return n ? Math.floor(n).toLocaleString() : '0'; 
    },
    calcMonthly(i) { 
        const amount = i.amount || 0;
        const rawMonthly = (amount * 10000 * (i.coupon / 100)) / 12;
        return i.currency === 'JPY' ? Math.floor(rawMonthly) : parseFloat(rawMonthly.toFixed(2));
    }
};

    `,
    methods: {
        formatNum: FcnUtils.formatNum,
        calcMonthly: FcnUtils.calcMonthly,
        isLocked: FcnUtils.isLocked,
        formatPrice(n) {
            if (!n || n == 0) return '---';
            return (Math.floor(parseFloat(n) * 100) / 100).toFixed(2);
        },
        getStockName(c) { return stockNames[c] || c; },
        getPerf(i, s) {
            if (!s.init || !s.current || s.current <= 0) return '100.00';
            return ((s.current / s.init) * 100).toFixed(2);
        },
        perfColor(i, s) {
            if (!s.current || s.current <= 0) return 'text-gray-300';
            const p = parseFloat(this.getPerf(i, s));
            if (p >= i.koP) return 'text-success';
            if (p <= i.kiP) return 'text-danger';
            return 'text-gray-400';
        },
        hasBreachedKI(i) {
            if (!i.stocks || i.kiP <= 0) return false;
            const dateLimit = FcnUtils.parseDate(i.date);
            return i.stocks.some(s => {
                const lowest = FcnUtils.getLowestSince(s, dateLimit);
                return lowest > 0 && lowest <= (s.init * i.kiP / 100);
            });
        },
        getStockClass(i, s) {
            if (this.isStockKI(i, s)) return 'ki-hit';
            if (this.isStockKO(i, s)) return 'ko-hit';
            return '';
        },
        isStockKI(i, s) {
            if (i.kiP <= 0) return false;
            const dateLimit = FcnUtils.parseDate(i.date);
            const lowest = FcnUtils.getLowestSince(s, dateLimit);
            return lowest > 0 && lowest <= (s.init * i.kiP / 100);
        },
        isStockKO(i, s) {
            if (FcnUtils.isLocked(i)) return false;
            const start = FcnUtils.parseDate(i.koStart);
            const highest = FcnUtils.getHighestSince(s, start);
            return highest >= (s.init * i.koP / 100);
        }
    }
};

createApp({

        return {

            form: { client:'', sn:'', sales:'', currency:'USD', coupon:null, koP:105, kiP:60, strikeP:100, koStart:'', date:'', expiry:'', amount:null, stocks:[{code:'',init:null}] },
            editIndex: null,
            dirty: false,
            githubToken: localStorage.getItem('fcn_token') || '',
            selectedFile: null, fileName: '', isUploading: false,
            inventory: [], isSyncing: false, search: '', alertTab: 'ki', selectedSales: '吳坤達',
            lastUpdated: '',
            stagingList: [] 
        }
    },
    computed: {
        countJPY() { return this.inventory.filter(i => i.currency === 'JPY').length; },
        countUSD() { return this.inventory.filter(i => i.currency === 'USD').length; },
        totalJPY() { return this.inventory.filter(i => i.currency === 'JPY').reduce((s, i) => s + (i.amount||0), 0); },
        totalUSD() { return this.inventory.filter(i => i.currency === 'USD').reduce((s, i) => s + (i.amount||0), 0); },
        salesSummary() {
            const map = {}; 
            this.inventory.forEach(i => { if (i.sales) map[i.sales] = (map[i.sales] || 0) + 1; });
            return Object.keys(map).map(k => ({ name: k, count: map[k] })).sort((a,b) => b.count - a.count);
        },
        kiList() {
            return this.inventory.filter(i => {
                if (!i.stocks || i.kiP <= 0) return false;
                const dateLimit = FcnUtils.parseDate(i.date);
                return i.stocks.some(s => {
                    const lowest = FcnUtils.getLowestSince(s, dateLimit);
                    return lowest > 0 && lowest <= (s.init * i.kiP / 100);
                });
            });
        },
        observationList() {
            const now = new Date();
            return this.inventory.filter(i => {
                try {
                    if (!i.koStart || !i.stocks) return false;
                    const start = FcnUtils.parseDate(i.koStart);
                    if (isNaN(start.getTime())) return false;
                    const diff = Math.ceil((start - now) / 86400000);
                    if (diff < 0 || diff > 3) return false;
                    const koCount = i.stocks.filter(s => s.current > 0 && ((s.current/s.init)*100) >= i.koP).length;
                    const lastStock = i.stocks.find(s => s.current > 0 && ((s.current/s.init)*100) < i.koP);
                    const isNearPrice = lastStock && (lastStock.current / (lastStock.init * i.koP / 100)) >= 0.97;
                    return (i.stocks.length === koCount || (i.stocks.length - koCount === 1 && isNearPrice));
                } catch(e) { return false; }
            });
        },
        partKOList() {
            return this.inventory.filter(i => {
                if (FcnUtils.isLocked(i)) return false;
                if (this.exitList.includes(i)) return false;
                const start = FcnUtils.parseDate(i.koStart);
                return i.stocks && i.stocks.some(s => {
                    const highest = FcnUtils.getHighestSince(s, start);
                    return highest >= (s.init * i.koP / 100);
                });
            });
        },
        nearKOList() {
            return this.inventory.filter(i => {
                if (FcnUtils.isLocked(i)) return false;
                if (this.exitList.includes(i)) return false; 
                const start = FcnUtils.parseDate(i.koStart);
                const passedStocks = (i.stocks || []).filter(s => {
                    const highest = FcnUtils.getHighestSince(s, start);
                    return highest >= (s.init * i.koP / 100);
                });
                if (i.stocks.length - passedStocks.length !== 1) return false;
                const failedStock = i.stocks.find(s => {
                    const highest = FcnUtils.getHighestSince(s, start);
                    return highest < (s.init * i.koP / 100);
                });
                if (!failedStock) return false;
                return failedStock.current >= ((failedStock.init * i.koP / 100) * 0.97);
            });
        },
        expiringList() {
            const now = new Date();
            now.setHours(0,0,0,0);
            return this.inventory.filter(i => {
                if (!i.expiry) return false;
                const exp = FcnUtils.parseDate(i.expiry);
                const diff = Math.ceil((exp - now) / 86400000);
                return diff >= 0 && diff <= 3;
            });
        },
        exitList() {
            return this.inventory.filter(i => {
                if (FcnUtils.isLocked(i)) return false;
                const start = FcnUtils.parseDate(i.koStart);
                return i.stocks && i.stocks.length > 0 && i.stocks.every(s => {
                    const highest = FcnUtils.getHighestSince(s, start);
                    return highest >= (s.init * i.koP / 100);
                });
            });
        },
        currentAlertList() {
            const m = {ki:this.kiList, obs:this.observationList, pko:this.partKOList, nko:this.nearKOList, exp:this.expiringList, exit:this.exitList};
            return m[this.alertTab] || [];
        },
        clientFilteredList() {
            const s = (this.search || "").toLowerCase().trim();
            return !s ? this.inventory : this.inventory.filter(i => (i.client && i.client.includes(s)) || (i.sn && i.sn.toLowerCase().includes(s)));
        },
        salesFilteredList() { return this.inventory.filter(i => i.sales === this.selectedSales); }
    },
    methods: {
        formatNum: FcnUtils.formatNum,
        getStockName(c) { return stockNames[c] || c; },
        formatStockInput(stock) {
            if (!stock.code) return;
            stock.code = stock.code.toUpperCase().trim();
            if (/^\d{4}$/.test(stock.code)) {
                stock.code += '.T';
            }
        },
        // 針對分行客製化開發：Excel 欄位解析器
        handleExcelImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary', cellDates: true });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const json = XLSX.utils.sheet_to_json(worksheet);
                    
                    if (json.length === 0) {
                        alert('Excel 檔案內沒有資料。');
                        return;
                    }
                    
                    // 多元對齊關鍵字比對輔助函數
                    const getVal = (row, keys) => {
                        for (let k of keys) {
                            if (row[k] !== undefined && row[k] !== null) return row[k];
                        }
                        return '';
                    };
                    
                    // 日期轉換處理
                    const formatExcelDate = (val) => {
                        if (!val) return '';
                        if (val instanceof Date) {
                            // 修正 JS Date 轉換時區問題
                            const y = val.getFullYear();
                            const m = String(val.getMonth() + 1).padStart(2, '0');
                            const d = String(val.getDate()).padStart(2, '0');
                            return `${y}-${m}-${d}`;
                        }
                        // 純字串格式處理 (2026/06/30 或 2026-06-30)
                        return String(val).replace(/\//g, '-').trim();
                    };

                    const parsedList = json.map(row => {
                        // 1. 客戶欄位對接姓名 (E欄)
                        const client = String(getVal(row, ['姓名', '客戶', 'client'])).trim();
                        // 2. SN欄位對接商品編碼 (F欄)
                        const sn = String(getVal(row, ['商品編碼', 'ISIN', 'SN', 'sn'])).trim();
                        
                        if (!client || client === 'undefined' || !sn || sn === 'undefined') return null; 
                        
                        // 3. 業務員欄位 (Q欄：自動剔除前面的工號，如 "0005935-吳坤達" 轉換為 "吳坤達")
                        let salesRaw = String(getVal(row, ['營業員', '業務員', 'sales'])).trim();
                        let sales = '吳坤達'; 
                        if (salesRaw && salesRaw !== 'undefined') {
                            const match = salesRaw.match(/[^\d\s\-]+/);
                            if (match) sales = match[0];
                        }

                        // 4. 掛鉤標的提取 (G欄：ISIN 即為標的識別)
                        const stocks = [];
                        let isinCode = String(getVal(row, ['ISIN', '商品編碼'])).trim().toUpperCase();
                        if (isinCode && isinCode !== 'UNDEFINED') {
                            stocks.push({
                                code: isinCode,
                                init: null, // 未知期初成交價，待使用者補登
                                current: null,
                                history: null
                            });
                        }

                        // 5. 處理 KO, KI, PUT 比例 (防呆，若為 "NA" 則代入預設安全邊界)
                        const parsePct = (val, def) => {
                            if (val === undefined || val === null || String(val).toUpperCase() === 'NA') return def;
                            const num = parseFloat(val);
                            return isNaN(num) ? def : num;
                        };

                        return {
                            client,
                            sn,
                            sales,
                            currency: String(getVal(row, ['計價幣別', '幣別', 'currency'])).trim().toUpperCase() || 'USD',
                            coupon: parseFloat(getVal(row, ['配息年率(%)', '配息率', 'coupon'])) || null,
                            amount: parseFloat(getVal(row, ['庫存金額', '金額', 'amount'])) || null,
                            koP: parsePct(getVal(row, ['KO價(%)', 'KO(%)']), 105),
                            kiP: parsePct(getVal(row, ['KI價(%)', 'KI(%)']), 60),
                            strikeP: parsePct(getVal(row, ['履約價(%)', 'PUT(%)']), 100),
                            koStart: formatExcelDate(getVal(row, ['下單日', '觀察日'])), // 觀察起日若沒有則對應下單日
                            date: formatExcelDate(getVal(row, ['下單日', '下單日期'])),
                            expiry: formatExcelDate(getVal(row, ['到期日', '到期日期'])),
                            stocks
                        };
                    }).filter(item => item !== null);

                    if (parsedList.length === 0) {
                        alert('未能成功比對出「姓名」與「商品編碼」欄位，請確認 Excel 表頭是否有這些欄位！');
                        return;
                    }
                    
                    this.stagingList = parsedList;
                    alert(`Excel 成功載入 ${parsedList.length} 筆客戶資料！請在下方「待補登期初價」區塊填入價格後匯入部位。`);
                } catch (err) {
                    alert('Excel 檔案解析錯誤：' + err.message);
                }
            };
            reader.readAsBinaryString(file);
        },
        commitStaging() {
            if (this.stagingList.length === 0) return;
            
            const unFilled = this.stagingList.filter(item => item.stocks.some(st => st.init === null || st.init === undefined || st.init <= 0));
            if (unFilled.length > 0) {
                if (!confirm(`還有 ${unFilled.length} 筆資料的標的期初成交價未完全補登 (將暫時設為 0)。確定要繼續匯入嗎？`)) {
                    return;
                }
            }

            this.stagingList.forEach(item => {
                item.stocks.forEach(st => {
                    if (st.init > 0) {
                        st.current = st.init;
                    }
                });
                this.inventory.push(item);
            });

            this.stagingList = [];
            this.dirty = true;
            alert('部位匯入成功！已啟動最新報價與歷史數據同步...');
            this.fetchRealPrices(); 
        },
        login() { 
            if (this.inputPass === this.password) { 
                this.isLoggedIn = true; 
                sessionStorage.setItem('fcn_auth', 'true'); 
            } else {
                alert('密碼錯誤');
            }
        },
        checkAdminPass() { 
            if (this.adminPassInput === this.adminPass) { 
                this.view = 'admin_panel'; 
            } else { 
                alert('管理驗證錯誤'); 
            } 
        },
        handleFileUpload(e) { 
            const f = e.target.files[0]; 
            if (f) { this.selectedFile=f; this.fileName=f.name; } 
        },
        resetForm() {
            this.form = { client:'', sn:'', sales:'', currency:'USD', coupon:null, koP:105, kiP:60, strikeP:100, koStart:'', date:'', expiry:'', amount:null, stocks:[{code:'',init:null}] };
            this.editIndex = null;
        },
        submitEntry() {
            const f = this.form;
            if (!f.client) { alert('請輸入客戶'); return; }
            if (!f.sn) { alert('請輸入SN'); return; }
            
            const stocks = (f.stocks || []).filter(s => s.code).map(s => ({ 
                code: String(s.code).trim().toUpperCase(), 
                init: s.init, 
                current: s.init, 
                history: null 
            }));
            
            const item = { 
                client: f.client.trim(), sn: f.sn.trim(), sales: f.sales.trim(), 
                currency: f.currency, coupon: f.coupon, koP: f.koP, kiP: f.kiP, 
                strikeP: f.strikeP, koStart: f.koStart, date: f.date, expiry: f.expiry, 
                amount: f.amount, stocks 
            };
            
            if (this.editIndex === null) this.inventory.push(item);
            else this.inventory.splice(this.editIndex, 1, item);
            
            this.dirty = true;
            this.resetForm();
            this.fetchRealPrices(); 
        },
        editEntry(idx) {
            const it = this.inventory[idx];
            this.form = { 
                client: it.client, sn: it.sn, sales: it.sales, currency: it.currency, 
                coupon: it.coupon, koP: it.koP, kiP: it.kiP, strikeP: it.strikeP, 
                koStart: it.koStart, date: it.date, expiry: it.expiry, amount: it.amount, 
                stocks: (it.stocks||[]).map(s => ({ code: s.code, init: s.init })) 
            };
            if (!this.form.stocks.length) this.form.stocks = [{code:'',init:null}];
            this.editIndex = idx;
            window.scrollTo({ top:0, behavior:'smooth' });
        },
        deleteEntry(idx) { 
            if (confirm('確定刪除這筆？此動作將會在您儲存後永久生效。')) { 
                this.inventory.splice(idx, 1); 
                this.dirty = true; 
            } 
        },
        downloadCSV() {
            if (!this.inventory.length) { alert('目前沒有資料'); return; }
            const csv = '\uFEFF' + this.inventoryToCSV(); 
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            const d = new Date();
            a.download = `data_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.csv`;
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        },
        inventoryToCSV() {
            const cols = ['client','sn','sales','currency','coupon','koP','kiP','strikeP','koStart','date','expiry','amount','s1_code','s1_init','s2_code','s2_init','s3_code','s3_init','s4_code','s4_init'];
            const esc = v => { if (v == null) return ''; const s = String(v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
            const lines = [cols.join(',')];
            this.inventory.forEach(it => {
                const st = it.stocks || [];
                const row = { client:it.client, sn:it.sn, sales:it.sales, currency:it.currency, coupon:it.coupon, koP:it.koP, kiP:it.kiP, strikeP:it.strikeP, koStart:it.koStart, date:it.date, expiry:it.expiry, amount:it.amount };
                for (let i = 0; i < 4; i++) { row['s'+(i+1)+'_code'] = st[i] ? st[i].code : ''; row['s'+(i+1)+'_init'] = st[i] ? st[i].init : ''; }
                lines.push(cols.map(c => esc(row[c])).join(','));
            });
            return lines.join('\n');
        },
        riskStatus(i) {
            const parts = [];
            try {
                if (i.kiP > 0) {
                    const dl = FcnUtils.parseDate(i.date);
                    if ((i.stocks || []).some(s => { const lo = FcnUtils.getLowestSince(s, dl); return lo > 0 && lo <= (s.init * i.kiP / 100); })) parts.push('觸及KI');
                }
                if (!FcnUtils.isLocked(i)) {
                    const st = FcnUtils.parseDate(i.koStart);
                    if ((i.stocks || []).some(s => { const hi = FcnUtils.getHighestSince(s, st); return hi >= (s.init * i.koP / 100); })) parts.push('曾達KO');
                }
            } catch (e) {}
            return parts.length ? parts.join('、') : '正常';
        },
        exportExcel() {
            if (typeof XLSX === 'undefined') { alert('Excel 元件尚未載入完成，請稍候再試一次'); return; }
            if (!this.inventory.length) { alert('目前沒有資料可匯出'); return; }
            const perf = s => (s.init && s.current) ? Math.round((s.current / s.init) * 10000) / 100 : '';
            const rows = this.inventory.map(it => {
                const st = it.stocks || [];
                const row = {
                    '客戶': it.client, 'SN': it.sn, '業務員': it.sales, '幣別': it.currency,
                    '票息(%)': it.coupon, '庫存金額(萬)': it.amount,
                    '月利率(%)': (it.coupon != null) ? Math.round((it.coupon / 12) * 10000) / 10000 : '',
                    '下單日': it.date, '觀察起日': it.koStart, '到期日': it.expiry,
                    'KO(%)': it.koP, 'KI(%)': it.kiP, 'PUT(%)': it.strikeP,
                };
                for (let i = 0; i < 4; i++) {
                    const s = st[i];
                    row['標的' + (i+1)] = s ? s.code : '';
                    row['期初' + (i+1)] = s ? s.init : '';
                    row['現價' + (i+1)] = s ? s.current : '';
                    row['表現' + (i+1) + '(%)'] = s ? perf(s) : '';
                }
                row['風險狀態'] = this.riskStatus(it);
                return row;
            });
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'FCN部位');
            const d = new Date();
            const ymd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
            XLSX.writeFile(wb, `FCN部位_${ymd}.xlsx`);
        },
        async saveAllToGithub() {
            if (!this.githubToken) { alert('請先貼上 GitHub Token'); return; }
            this.isUploading = true;
            try {
                const owner = 'hpisokplay', repo = 'fcn-dashboard', path = 'data.csv';
                localStorage.setItem('fcn_token', this.githubToken);
                const csv = this.inventoryToCSV();
                const content = btoa(unescape(encodeURIComponent(csv)));
                let sha;
                const g = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, { headers: { 'Authorization': `token ${this.githubToken}` } });
                if (g.ok) { const gd = await g.json(); sha = gd.sha; }
                const pr = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${this.githubToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'Update data.csv (web entry)', content, sha })
                });
                if (pr.ok) { this.dirty = false; alert('已儲存到 GitHub！約 1 分鐘後生效。'); }
                else { const e = await pr.json().catch(() => ({})); alert('儲存失敗：' + (e.message || pr.status)); }
            } catch (e) { alert('錯誤：' + e.message); } finally { this.isUploading = false; }
        },
        async uploadToGithub() {
            if (!this.githubToken) { alert('請先貼上 GitHub Token'); return; }
            this.isUploading = true;
            try {
                const owner='hpisokplay', repo='fcn-dashboard', path='data.csv';
                const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {headers:{'Authorization':`token ${this.githubToken}`}});
                const fd = await res.json();
                const r = new FileReader();
                r.onload = async (e) => {
                    const c = e.target.result.split(',')[1];
                    const pr = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                        method:'PUT', headers:{'Authorization':`token ${this.githubToken}`,'Content-Type':'application/json'},
                        body: JSON.stringify({message:'Web Update', content:c, sha:fd.sha})
                    });
                    if (pr.ok) { alert('同步成功'); location.reload(); }
                };
                r.readAsDataURL(this.selectedFile);
            } catch(e) { alert('同步失敗，請檢查 Token 與專案權限'); } finally { this.isUploading=false; }
        },
        async loadCSVData() {
            this.isSyncing = true;
            try {
                const response = await fetch('data.csv?v=' + Date.now());
                const csvText = await response.text();
                Papa.parse(csvText, {
                    header: true, dynamicTyping: true, skipEmptyLines: true,
                    transformHeader: h => h.trim().replace(/^﻿/, ""),
                    complete: (results) => {
                        this.inventory = results.data.map(row => {
                            const stocks = [];
                            for (let i=1; i<=4; i++) {
                                if (row[`s${i}_code`]) stocks.push({
                                    code: String(row[`s${i}_code`]).trim().toUpperCase(),
                                    init: row[`s${i}_init`],
                                    current: row[`s${i}_init`],
                                    history: null
                                });
                            }
                            return {
                                ...row,
                                client: row.client ? String(row.client).trim() : '',
                                sn: row.sn ? String(row.sn).trim() : '',
                                stocks: stocks
                            };
                        });
                        this.dirty = false;
                        this.fetchRealPrices();
                    }
                });
            } catch (e) { console.error("CSV ERR"); } finally { this.isSyncing = false; }
        },
        async fetchRealPrices() {
            if (this.inventory.length === 0) return;
            this.isSyncing = true;
            try {
                const resp = await fetch('prices.json?v=' + Date.now());
                if (!resp.ok) throw new Error('no prices.json');
                const payload = await resp.json();
                const prices = payload.prices || {};
                if (!Object.keys(prices).length) throw new Error('empty prices.json');
                this.inventory.forEach(item => {
                    (item.stocks || []).forEach(stock => {
                        const p = prices[stock.code];
                        if (p && p.current != null) {
                            stock.current = p.current;
                            stock.history = { timestamp: p.timestamp, high: p.high, low: p.low };
                        }
                    });
                });
                this.lastUpdated = new Date().toLocaleTimeString() + '（每日自動）';
            } catch (e) {
                console.warn('prices.json 讀取失敗，改用即時抓取', e);
                const symbols = [...new Set(this.inventory.flatMap(i => (i.stocks || []).map(s => s.code)))];
                try {
                    await Promise.all(symbols.map(async (symbol) => {
                        try {
                            const ysym = symbol.endsWith('.T') ? symbol : symbol.replace('.', '-');
                            const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ysym}?interval=1d&range=2y`;
                            const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                            const d = await r.json();
                            const j = JSON.parse(d.contents);
                            const res = j.chart.result[0];
                            const cur = res.meta.regularMarketPrice;
                            const hist = { timestamp: res.timestamp, high: res.indicators.quote[0].high, low: res.indicators.quote[0].low };
                            if (cur) this.inventory.forEach(item => (item.stocks || []).forEach(stock => {
                                if (stock.code === symbol) { stock.current = cur; stock.history = hist; }
                            }));
                        } catch (err) { console.warn("Fail: " + symbol); }
                    }));
                    this.lastUpdated = new Date().toLocaleTimeString() + '（即時）';
                } catch (e2) { console.error("ERR", e2); }
            } finally {
                this.isSyncing = false;
            }
        }
    },
    mounted() {
        if (sessionStorage.getItem('fcn_auth') === 'true') this.isLoggedIn = true;
        this.loadCSVData();
        setInterval(() => this.fetchRealPrices(), 60000);
        window.addEventListener('beforeunload', (e) => {
            if (this.dirty) { e.preventDefault(); e.returnValue = '你有尚未儲存的資料，確定要離開或重新整理嗎？'; }
        });
    }
}).mount('#app');
</script>
