<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上新莊分行 - FCN 管理系統 (手動輸入版)</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        body { background-color: #f8fafc; color: #1e293b; font-family: sans-serif; }
        .fcn-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-4">
<div id="app" v-cloak class="max-w-3xl mx-auto">
    <!-- 登入與基礎頁面邏輯 -->
    <div v-if="isLoggedIn">
        <h1 class="text-xl font-black mb-4">手動輸入與 GitHub 儲存</h1>
        
        <!-- 你的 Token 設定 -->
        <div class="mb-6 p-4 bg-white rounded-xl border">
            <input v-model="githubToken" type="password" placeholder="GitHub Token" class="w-full p-2 border rounded mb-2 text-sm font-mono">
            <button @click="saveToGithub" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">儲存所有資料至 GitHub</button>
        </div>

        <!-- 這裡放你原本的資料輸入表單 -->
        <div class="fcn-card">
            <h2 class="font-bold mb-4">新增部位</h2>
            <div class="grid grid-cols-2 gap-2 text-sm">
                <input v-model="form.client" placeholder="客戶名稱" class="border p-2 rounded">
                <input v-model="form.sn" placeholder="商品代碼 (SN)" class="border p-2 rounded">
                <!-- 其他欄位自行補上 -->
            </div>
            <button @click="addEntry" class="mt-4 w-full bg-slate-800 text-white p-2 rounded">新增至列表</button>
        </div>

        <!-- 顯示資料 -->
        <div v-for="(it, idx) in inventory" :key="idx" class="fcn-card flex justify-between">
            <span>{{it.client}} - {{it.sn}}</span>
            <button @click="inventory.splice(idx,1)" class="text-red-500">刪除</button>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue;
createApp({
    data() {
        return {
            isLoggedIn: true, // 測試用，可改回 false
            githubToken: localStorage.getItem('fcn_token') || '',
            inventory: [],
            form: { client:'', sn:'' }
        }
    },
    methods: {
        addEntry() {
            this.inventory.push({...this.form});
            this.form = { client:'', sn:'' };
        },
        async saveToGithub() {
            if (!this.githubToken) return alert('請填入 Token');
            localStorage.setItem('fcn_token', this.githubToken);
            
            // 這裡請務必修改為你的正確資訊
            const owner = 'juststar0822'; 
            const repo = 'my-fcn-dashboard'; 
            const path = 'data.json';
            
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(this.inventory))));
            
            // 先抓取舊檔案的 sha (若無則會報 Not Found，需處理)
            try {
                let sha = null;
                const getRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, { headers: { 'Authorization': `token ${this.githubToken}` }});
                if (getRes.ok) {
                    const data = await getRes.json();
                    sha = data.sha;
                }

                const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${this.githubToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'Update FCN Data', content, sha })
                });

                if (res.ok) alert('儲存成功！');
                else alert('儲存失敗：' + res.statusText);
            } catch (e) { alert('發生錯誤：' + e.message); }
        }
    }
}).mount('#app');
</script>
</body>
</html>
