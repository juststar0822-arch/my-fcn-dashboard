<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCN專業報價系統 v7.4 - 數據精準版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { box-sizing: border-box; }
        body { background: #fafafa; font-family: 'Inter', "Microsoft JhengHei", sans-serif; color: #1e293b; }
        [v-cloak] { display: none; }
        .glass-input { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; transition: all 0.2s; font-weight: bold; }
        .glass-input:focus { border-color: #1e40af; outline: none; box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1); }
        .btn-premium { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); color: white; font-weight: 900; transition: all 0.3s; }
        .capture-box { width: 460px; margin: 0 auto; background: white; padding: 20px; }
        .page-container { width: 410px; border: 2px solid #000 !important; background: #fff; margin: 0 auto; overflow: hidden; position: relative; }
        .summary-header { font-size: 22px; font-weight: 900; text-align: center; border-bottom: 2px solid #000; padding: 12px; }
        .summary-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .navy-cell { background: #2c3e50; color: white; border: 1px solid #000; text-align: center; font-size: 12px; font-weight: bold; padding: 10px 2px; }
        .white-cell { background: #fff; border: 1px solid #000; text-align: center; font-weight: 900; font-size: 18px; padding: 8px 2px; height: 50px; }
        .orange-bar { background: #fbbf24; border-top: 1px solid #000; border-bottom: 1px solid #000; padding: 4px; text-align: center; font-weight: 900; font-size: 13px; width: 100%; }
        .detail-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: none; }
        .detail-table th, .detail-table td { border: 1px solid #000; font-size: 11px; font-weight: bold; padding: 6px 2px; text-align: center; }
        .row-container { display: flex; width: 100%; border-bottom: 1px solid #000; background: #fff; }
        .data-side { width: 125px; border-right: 1px solid #000; flex-shrink: 0; }
        .chart-side { flex-grow: 1; padding: 5px 5px 2px 0px; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
        .chart-box { height: 145px; width: 100%; position: relative; } 
        .chart-legend-bottom { display: flex; justify-content: center; gap: 8px; font-size: 8px; padding: 4px 0; font-weight: bold; color: #64748b; }
        .legend-item { display: flex; align-items: center; gap: 3px; }
        .legend-dash { width: 12px; height: 0px; border-top: 2px dashed; }
        .legend-solid { width: 12px; height: 2px; background: #3b82f6; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div id="app" v-cloak class="max-w-xl mx-auto">
        <div v-if="!isLocked" class="bg-white rounded-[2rem] p-8 shadow-2xl border border-slate-100 mb-6 no-print fade-in">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-black italic text-slate-800 tracking-tighter uppercase leading-none">FCN專業報價系統</h1>
                <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mt-2 text-center">Precision Data Engine v7.4</p>
            </div>

                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button @click="form.market = 'US'" :class="['flex-1 py-2 rounded-lg font-bold text-xs transition', form.market==='US'?'bg-white shadow-sm text-blue-600':'text-slate-400']">US 美股</button>
                    <button @click="form.market = 'JP'" :class="['flex-1 py-2 rounded-lg font-bold text-xs transition', form.market==='JP'?'bg-white shadow-sm text-blue-600':'text-slate-400']">JP 日股</button>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 mb-1 px-1 uppercase tracking-widest text-center">連結標的代碼 (美股請輸入代號, 日股代碼即可)</label>
                    <input v-model="form.tickers" class="w-full glass-input text-center text-lg font-black uppercase" placeholder="NVDA, TSM / 7203, 285A">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 mb-1">發行機構</label>
                        <select v-model="form.issuer" class="w-full glass-input text-sm appearance-none cursor-pointer">
                            <option v-for="opt in issuerOptions" :key="opt" :value="opt">{{ opt }}</option>
                        </select>
